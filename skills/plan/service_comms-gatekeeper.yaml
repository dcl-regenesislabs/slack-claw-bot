  docs_database-schemas_md: |
    # Database Schema Documentation
    
    This document describes the database schema for the Comms Gatekeeper service. The schema uses PostgreSQL and is managed through migrations located in `src/migrations/`.
    
    ## Database Schema Diagram
    
    ```mermaid
    erDiagram
        scene_admin {
            UUID id PK "Admin record ID"
            TEXT place_id "Scene/place identifier"
            TEXT admin "Admin address"
            TEXT added_by "Who added the admin"
            BIGINT created_at "Creation timestamp"
            BOOLEAN active "Active status"
        }
        
        scene_stream_access {
            UUID id PK "Stream access ID"
            TEXT place_id "Scene/place identifier"
            TEXT streaming_url "RTMP streaming URL"
            TEXT streaming_key "Streaming key"
            TEXT ingress_id "LiveKit ingress ID"
            TEXT room_id "LiveKit room ID"
            TEXT generated_by "Who generated the stream"
            BIGINT created_at "Creation timestamp"
            BIGINT expiration_time "Expiration timestamp"
            BOOLEAN streaming "Is currently streaming"
            BIGINT streaming_start_time "Streaming start time"
            BOOLEAN active "Active status"
        }
        
        scene_bans {
            UUID id PK "Ban record ID"
            TEXT place_id "Scene/place identifier"
            TEXT banned_address "Banned user address"
            TEXT banned_by "Who issued the ban"
            BIGINT banned_at "Ban timestamp"
        }
        
        voice_chat_users {
            VARCHAR address PK "User address"
            VARCHAR room_name PK "Voice chat room name"
            VARCHAR status "Connection status"
            BIGINT joined_at "Join timestamp"
            BIGINT status_updated_at "Status update timestamp"
        }
        
        community_voice_chat_users {
            TEXT address PK "User address"
            TEXT room_name PK "Voice chat room name"
            BOOLEAN is_moderator "Moderator flag"
            TEXT status "Connection status"
            BIGINT joined_at "Join timestamp"
            BIGINT status_updated_at "Status update timestamp"
            TIMESTAMPTZ created_at "Creation timestamp"
        }
        
        scene_admin ||--o{ scene_stream_access : "manages"
        scene_admin ||--o{ scene_bans : "issues"
    ```
    
    ## Tables Overview
    
    The database contains the following tables:
    
    1. **`scene_admin`** - Stores scene administrators who can manage scenes
    2. **`scene_stream_access`** - Manages RTMP streaming URLs and keys for content creators
    3. **`scene_bans`** - Tracks users banned from specific scenes
    4. **`voice_chat_users`** - Tracks participants in private voice chat rooms
    5. **`community_voice_chat_users`** - Tracks participants in community voice chat rooms with moderation
    
    ## Table: `scene_admin`
    
    Stores scene administrators who have management privileges for specific scenes.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique admin record identifier. |
    | `place_id` | TEXT | NOT NULL | Scene/place identifier. |
    | `admin` | TEXT | NOT NULL | Ethereum address of the admin. |
    | `added_by` | TEXT | NOT NULL | Ethereum address of who added this admin. |
    | `created_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the admin was added. |
    | `active` | BOOLEAN | NOT NULL | Active status. Defaults to `true`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Unique Index**: `unique_active_scene_admin_place_id_admin` on `(place_id, admin)` where `active = true` - Ensures one active admin per place_id/admin combination
    
    ### Business Rules
    
    1. Only one active admin record per place_id/admin combination
    2. Inactive admins can be reactivated by setting `active = true`
    3. Timestamps stored in milliseconds (BIGINT)
    
    ---
    
    ## Table: `scene_stream_access`
    
    Manages RTMP streaming URLs and keys for content creators to broadcast to scenes.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique stream access identifier. |
    | `place_id` | TEXT | NOT NULL | Scene/place identifier. |
    | `streaming_url` | TEXT | NOT NULL | RTMP streaming URL for the stream. |
    | `streaming_key` | TEXT | NOT NULL | Streaming key for authentication. |
    | `ingress_id` | TEXT | NOT NULL | LiveKit ingress ID (can be empty for Cast 2.0). |
    | `room_id` | TEXT | NULL | LiveKit room ID (e.g., `scene:realm:sceneId`). |
    | `generated_by` | TEXT | NULL | Ethereum address of who generated the stream link. |
    | `created_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the stream access was created. |
    | `expiration_time` | BIGINT | NULL | Timestamp (in milliseconds) when the stream access expires. |
    | `streaming` | BOOLEAN | NOT NULL | Whether the stream is currently active. Defaults to `false`. |
    | `streaming_start_time` | BIGINT | NULL | Timestamp (in milliseconds) when streaming started. |
    | `active` | BOOLEAN | NOT NULL | Active status. Defaults to `true`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Unique Index**: `unique_active_scene_stream_access_place_id` on `(place_id, active)` where `active = true` - One active stream per place
    - **Index**: `idx_scene_stream_access_room_id` on `room_id` - For LiveKit room lookups
    - **Index**: `idx_scene_stream_access_generated_by` on `generated_by` - For tracking who generated streams
    - **Index**: `idx_scene_stream_access_expiration_time` on `expiration_time` - For cleanup queries
    - **Index**: `idx_scene_stream_access_streaming_key` on `streaming_key` - For key lookups
    
    ### Business Rules
    
    1. Only one active stream access record per place_id
    2. `ingress_id` can be empty for Cast 2.0 (WebRTC) streams
    3. `room_id` stores the LiveKit room identifier for direct lookups
    4. Streams can have expiration times for automatic cleanup
    5. `streaming` flag tracks whether the stream is currently active
    6. Timestamps stored in milliseconds (BIGINT)
    
    ---
    
    ## Table: `scene_bans`
    
    Tracks users who have been banned from specific scenes.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique ban record identifier. |
    | `place_id` | TEXT | NOT NULL | Scene/place identifier. |
    | `banned_address` | TEXT | NOT NULL | Ethereum address of the banned user. |
    | `banned_by` | TEXT | NOT NULL | Ethereum address of who issued the ban. |
    | `banned_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the ban was issued. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Unique Index**: `unique_scene_bans_place_id_banned_address` on `(place_id, banned_address)` - One ban record per user per scene
    
    ### Business Rules
    
    1. One ban record per user per scene
    2. Bans are permanent (no expiration or active flag)
    3. Timestamps stored in milliseconds (BIGINT)
    
    ---
    
    ## Table: `voice_chat_users`
    
    Tracks participants in private voice chat rooms.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `address` | VARCHAR(42) | NOT NULL | **Primary Key (part 1)**. Ethereum address of the user. |
    | `room_name` | VARCHAR | NOT NULL | **Primary Key (part 2)**. Voice chat room name. |
    | `status` | VARCHAR | NOT NULL | Connection status: `'connected'`, `'connection_interrupted'`, or `'disconnected'`. |
    | `joined_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the user joined. |
    | `status_updated_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the status was last updated. |
    
    ### Indexes
    
    - **Composite Primary Key**: `(address, room_name)` - One user per room
    - **Index**: `room_name` - For efficient room queries
    - **Index**: `idx_voice_chat_users_status_joined_at_status_updated_at` on `(status, joined_at, status_updated_at)` - For cleanup and status queries
    
    ### Business Rules
    
    1. One user record per room (composite primary key)
    2. Status values: `'connected'`, `'connection_interrupted'`, `'disconnected'`
    3. Timestamps stored in milliseconds (BIGINT)
    
    ---
    
    ## Table: `community_voice_chat_users`
    
    Tracks participants in community voice chat rooms with moderation capabilities.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `address` | TEXT | NOT NULL | **Primary Key (part 1)**. Ethereum address of the user. |
    | `room_name` | TEXT | NOT NULL | **Primary Key (part 2)**. Voice chat room name. |
    | `is_moderator` | BOOLEAN | NOT NULL | Whether the user is a moderator. Defaults to `false`. |
    | `status` | TEXT | NOT NULL | Connection status: `'connected'`, `'connection_interrupted'`, `'disconnected'`, or `'not_connected'`. |
    | `joined_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the user joined. |
    | `status_updated_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the status was last updated. |
    | `created_at` | TIMESTAMPTZ | NOT NULL | Timestamp when the record was created. Defaults to `now()`. |
    
    ### Indexes
    
    - **Composite Primary Key**: `(address, room_name)` - One user per room
    - **Index**: `room_name` - For efficient room queries
    - **Index**: `(room_name, is_moderator)` - For moderator queries
    - **Index**: `(status, status_updated_at)` - For cleanup jobs and status-based queries
    
    ### Constraints
    
    - **Check Constraint**: `status IN ('connected', 'connection_interrupted', 'disconnected', 'not_connected')`
    
    ### Business Rules
    
    1. One user record per room (composite primary key)
    2. Status values: `'connected'`, `'connection_interrupted'`, `'disconnected'`, `'not_connected'`
    3. Moderators can manage speakers and requests-to-speak
    4. Timestamps stored in milliseconds (BIGINT) for `joined_at` and `status_updated_at`
    5. `created_at` uses TIMESTAMPTZ for debugging purposes
    
    ---
    
    ## Related Code
    
    - **Migrations**: `src/migrations/`
    - **Database Adapters**: `src/adapters/db/`
    - **Types**: `src/types/`
    

  docs_schemas_yaml: |
    components:
      schemas:
        ErrorResponse:
          type: object
          required:
            - error
          properties:
            error:
              type: string
              description: 'Error message describing what went wrong'
    
        # Basic response schemas
        PingResponse:
          type: string
          description: 'The pathname that was pinged'
    
        StatusResponse:
          type: object
          required:
            - version
            - currentTime
            - commitHash
          properties:
            version:
              type: string
              description: 'Current version of the service'
            currentTime:
              type: integer
              format: int64
              description: 'Current timestamp in milliseconds'
            commitHash:
              type: string
              description: 'Git commit hash of the current deployment'
    
        # Scene adapter response
        SceneAdapterResponse:
          type: object
          required:
            - adapter
          properties:
            adapter:
              type: string
              description: 'LiveKit connection URL for the scene'
    
        # Scene admin schemas
        SceneAdmin:
          type: object
          required:
            - admin
            - name
            - canBeRemoved
          properties:
            admin:
              type: string
              description: 'ETH address of the admin'
            name:
              type: string
              description: 'Display name of the admin'
            canBeRemoved:
              type: boolean
              description: 'Whether this admin can be removed (false for land lease owners)'
    
        AddSceneAdminRequest:
          type: object
          properties:
            admin:
              type: string
              description: 'ETH address of the admin to add'
            name:
              type: string
              description: 'Decentraland name of the admin to add'
    
        RemoveSceneAdminRequest:
          type: object
          properties:
            admin:
              type: string
              description: 'ETH address of the admin to add'
    
        # Scene ban schemas
        SceneBan:
          type: object
          properties:
            bannedAddress:
              type: string
              description: 'ETH address of the banned user'
            name:
              type: string
              description: 'Name of the banned user'
    
        AddSceneBanRequest:
          type: object
          properties:
            banned_address:
              type: string
              description: 'ETH address of the user to ban'
            banned_name:
              type: string
              description: 'Name of the user to ban'
    
        ListSceneBansResponse:
          type: object
          required:
            - results
            - total
            - page
            - pages
            - limit
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/SceneBan'
            total:
              type: integer
              description: 'Total number of bans'
            page:
              type: integer
              description: 'Current page number'
            pages:
              type: integer
              description: 'Total number of pages'
            limit:
              type: integer
              description: 'Number of items per page'
    
        SceneBannedAddressesResponse:
          type: object
          required:
            - bannedAddresses
          properties:
            bannedAddresses:
              type: array
              items:
                type: string
              description: 'Array of banned ETH addresses'
    
        # Scene stream access schemas
        SceneStreamAccess:
          type: object
          required:
            - id
            - place_id
            - streaming_key
            - streaming_url
            - ingress_id
            - created_at
            - active
            - streaming
            - streaming_start_time
          properties:
            id:
              type: string
              description: 'Unique identifier of the stream access'
            place_id:
              type: string
              description: 'ID of the place'
            streaming_key:
              type: string
              description: 'Streaming key for the stream'
            streaming_url:
              type: string
              description: 'URL for the stream'
            ingress_id:
              type: string
              description: 'LiveKit ingress ID'
            created_at:
              type: integer
              format: int64
              description: 'Timestamp when the access was created'
            active:
              type: boolean
              description: 'Whether the stream access is active'
            streaming:
              type: boolean
              description: 'Whether the stream is currently active'
            streaming_start_time:
              type: integer
              format: int64
              description: 'Timestamp when streaming started'
    
        AddSceneStreamAccessRequest:
          type: object
          required:
            - streaming_url
            - streaming_key
            - ingress_id
          properties:
            streaming_url:
              type: string
              description: 'URL for the stream'
            streaming_key:
              type: string
              description: 'Streaming key for the stream'
            ingress_id:
              type: string
              description: 'LiveKit ingress ID'
    
        # Private messages schemas
        PrivateMessagesTokenResponse:
          type: object
          required:
            - adapter
          properties:
            adapter:
              type: string
              description: 'LiveKit connection URL for private messages'
    
        UpdatePrivateMessagesPrivacyRequest:
          type: object
          required:
            - private_messages_privacy
          properties:
            private_messages_privacy:
              type: string
              enum: [all, only_friends]
              description: 'Privacy setting for private messages'
    
        # Voice chat schemas
        VoiceChatStatusResponse:
          type: object
          required:
            - is_user_in_voice_chat
          properties:
            is_user_in_voice_chat:
              type: boolean
              description: 'Whether the user is currently in a voice chat'
    
        CreatePrivateVoiceChatRequest:
          type: object
          required:
            - user_addresses
            - room_id
          properties:
            user_addresses:
              type: array
              items:
                type: string
              minItems: 2
              maxItems: 2
              description: 'Array of exactly 2 ETH addresses for the private voice chat'
            room_id:
              type: string
              description: 'Unique identifier for the voice chat room'
    
        CreatePrivateVoiceChatResponse:
          type: object
          additionalProperties:
            type: object
            required:
              - connection_url
            properties:
              connection_url:
                type: string
                description: 'LiveKit connection URL for the user'
          description: 'Object with user addresses as keys and connection URLs as values'
    
        # Community voice chat schemas
        CommunityVoiceChatAction:
          type: string
          enum: [create, join, request-to-speak, promote-speaker, demote-speaker, kick-player]
          description: 'Action to perform in community voice chat'
    
        CommunityRole:
          type: string
          enum: [owner, moderator, member, none]
          description: 'Role of the user in the community'
    
        CommunityVoiceChatUserProfileMetadata:
          type: object
          properties:
            name:
              type: string
              description: 'Display name of the user'
            hasClaimedName:
              type: boolean
              description: 'Whether the user has claimed their name'
            profilePictureUrl:
              type: string
              description: 'URL of the user profile picture'
    
        CommunityVoiceChatRequest:
          type: object
          required:
            - community_id
            - user_address
            - action
          properties:
            community_id:
              type: string
              description: 'ID of the community'
            user_address:
              type: string
              description: 'ETH address of the user'
            action:
              $ref: '#/components/schemas/CommunityVoiceChatAction'
            user_role:
              $ref: '#/components/schemas/CommunityRole'
              description: 'Role of the user in the community (defaults to none)'
            profile_data:
              $ref: '#/components/schemas/CommunityVoiceChatUserProfileMetadata'
              description: 'Optional profile data for the user'
    
        CommunityVoiceChatResponse:
          type: object
          required:
            - connection_url
          properties:
            connection_url:
              type: string
              description: 'LiveKit connection URL for the community voice chat'
    
        CommunityVoiceChatStatusResponse:
          type: object
          required:
            - active
            - participantCount
            - moderatorCount
          properties:
            active:
              type: boolean
              description: 'Whether the community voice chat is active'
            participantCount:
              type: integer
              description: 'Number of participants in the voice chat'
            moderatorCount:
              type: integer
              description: 'Number of moderators in the voice chat'
    
        ActiveCommunityVoiceChat:
          type: object
          required:
            - communityId
            - participantCount
            - moderatorCount
          properties:
            communityId:
              type: string
              description: 'ID of the community'
            participantCount:
              type: integer
              description: 'Number of participants in the voice chat'
            moderatorCount:
              type: integer
              description: 'Number of moderators in the voice chat'
    
        GetAllActiveCommunityVoiceChatsResponse:
          type: object
          required:
            - activeChats
            - total
          properties:
            activeChats:
              type: array
              items:
                $ref: '#/components/schemas/ActiveCommunityVoiceChat'
            total:
              type: integer
              description: 'Total number of active community voice chats'
    
        GetBulkCommunityVoiceChatStatusRequest:
          type: object
          required:
            - community_ids
          properties:
            community_ids:
              type: array
              items:
                type: string
              description: 'Array of community IDs to get status for'
              example: ['community-1', 'community-2', 'community-3']
              minItems: 1
    
        CommunityVoiceChatStatus:
          type: object
          required:
            - community_id
            - active
            - participant_count
            - moderator_count
          properties:
            community_id:
              type: string
              description: 'ID of the community'
            active:
              type: boolean
              description: 'Whether the community voice chat is active'
            participant_count:
              type: integer
              description: 'Number of participants in the voice chat'
            moderator_count:
              type: integer
              description: 'Number of moderators in the voice chat'
    
        GetBulkCommunityVoiceChatStatusResponse:
          type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CommunityVoiceChatStatus'
              description: 'Array of community voice chat statuses'
    
        # LiveKit webhook schemas
        LivekitWebhookRequest:
          type: object
          description: 'LiveKit webhook payload (structure depends on webhook type)'
          additionalProperties: true
    
        # Pagination schemas
        PaginationParams:
          type: object
          properties:
            limit:
              type: integer
              minimum: 1
              maximum: 100
              default: 20
              description: 'Number of items per page'
            offset:
              type: integer
              minimum: 0
              default: 0
              description: 'Number of items to skip'
    
        # Authentication schemas
        SignedFetchHeaders:
          type: object
          description: 'Signed Fetch authentication headers'
          required:
            - x-identity-auth-chain-0
            - x-identity-auth-chain-1
            - x-identity-auth-chain-2
            - x-identity-timestamp
            - x-identity-metadata
          properties:
            x-identity-auth-chain-0:
              type: string
              description: 'Signer information JSON string'
              example: '{"type":"SIGNER","payload":"0xsigneraddress","signature":""}'
            x-identity-auth-chain-1:
              type: string
              description: 'Ephemeral key information JSON string'
              example: '{"type":"ECDSA_EPHEMERAL","payload":"Decentraland Login\nEphemeral address: 0xephemeraladdress\nExpiration: 2025-09-14T09:16:57.465Z","signature":"signature"}'
            x-identity-auth-chain-2:
              type: string
              description: 'Signed entity information JSON string'
              example: '{"type":"ECDSA_SIGNED_ENTITY","payload":"get:/path/to/resource:1757507662494:{}","signature":"signature"}'
            x-identity-timestamp:
              type: string
              description: 'Request timestamp'
              example: '1757507662494'
            x-identity-metadata:
              type: string
              description: 'Request metadata JSON string'
              example: '{}'
    
        BearerTokenAuth:
          type: object
          description: 'Bearer token authentication'
          properties:
            token:
              type: string
              description: 'Bearer token for authentication'
    
        # Cast 2.0 schemas
        StreamerTokenRequest:
          type: object
          required:
            - token
            - identity
          properties:
            token:
              type: string
              description: 'Streaming token for authentication'
            identity:
              type: string
              description: 'Display name for the streamer'
    
        WatcherTokenRequest:
          type: object
          required:
            - location
            - identity
          properties:
            location:
              type: string
              description: 'Location (parcel coordinates or world name)'
              example: '20,-4'
            identity:
              type: string
              description: 'Display name for the watcher'
    
        StreamerTokenResponse:
          type: object
          required:
            - url
            - token
            - roomId
            - identity
          properties:
            url:
              type: string
              description: 'LiveKit connection URL'
            token:
              type: string
              description: 'LiveKit JWT token for authentication'
            roomId:
              type: string
              description: 'LiveKit room ID'
            identity:
              type: string
              description: 'Unique internal identity for the streamer'
    
        WatcherTokenResponse:
          type: object
          required:
            - url
            - token
            - roomId
            - identity
          properties:
            url:
              type: string
              description: 'LiveKit connection URL'
            token:
              type: string
              description: 'LiveKit JWT token for authentication'
            roomId:
              type: string
              description: 'LiveKit room ID'
            identity:
              type: string
              description: 'Unique internal identity for the watcher'
            placeName:
              type: string
              description: 'Name of the place being watched'
    
        GenerateStreamLinkResponse:
          type: object
          required:
            - streamLink
            - watcherLink
            - streamingKey
            - placeId
            - placeName
            - expiresAt
            - expiresInDays
          properties:
            streamLink:
              type: string
              description: 'URL for streamers to access the stream'
            watcherLink:
              type: string
              description: 'URL for watchers to access the stream'
            streamingKey:
              type: string
              description: 'Unique streaming key for authentication'
            placeId:
              type: string
              description: 'ID of the place'
            placeName:
              type: string
              description: 'Name of the place'
            expiresAt:
              type: string
              format: date-time
              description: 'Expiration timestamp in ISO format'
            expiresInDays:
              type: integer
              description: 'Number of days until expiration'
    
        StreamInfoResponse:
          type: object
          required:
            - placeName
            - placeId
            - location
            - isWorld
          properties:
            placeName:
              type: string
              description: 'Name of the place'
            placeId:
              type: string
              description: 'ID of the place'
            location:
              type: string
              description: 'Location identifier (world name or parcel coordinates)'
            isWorld:
              type: boolean
              description: 'Whether this is a world or a parcel'

