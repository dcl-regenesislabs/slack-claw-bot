  components:
    securitySchemes:
      SignedFetch:
        type: apiKey
        in: header
        name: X-Identity-Auth-Chain-*
        description: |
          Signed fetch authentication using Decentraland's ADR-44 specification.
          Multiple headers are used to provide the authentication chain.
  
    schemas:
      About:
        type: object
        description: Detailed information about a world
        properties:
          healthy:
            type: boolean
            description: Overall health status
          acceptingUsers:
            type: boolean
            description: Whether the world is accepting new users
          configurations:
            type: object
            properties:
              networkId:
                type: integer
                description: Ethereum network chain ID
              globalScenesUrn:
                type: array
                items:
                  type: string
                description: URNs of global scenes
              scenesUrn:
                type: array
                items:
                  type: string
                description: URNs of world scenes
              realmName:
                type: string
                description: Display name of the realm
              minimap:
                type: object
                properties:
                  enabled:
                    type: boolean
                  dataImage:
                    type: string
                  estateImage:
                    type: string
              map:
                type: object
                properties:
                  minimapEnabled:
                    type: boolean
                  sizes:
                    type: array
                    items:
                      type: array
                      items:
                        type: integer
              skybox:
                type: object
                properties:
                  fixedHour:
                    type: number
                    nullable: true
                  textures:
                    type: array
                    items:
                      type: string
          content:
            type: object
            properties:
              synchronizationStatus:
                type: string
              healthy:
                type: boolean
              publicUrl:
                type: string
          lambdas:
            type: object
            properties:
              healthy:
                type: boolean
              publicUrl:
                type: string
          comms:
            type: object
            properties:
              healthy:
                type: boolean
              protocol:
                type: string
              adapter:
                type: string
  
      Entity:
        type: object
        description: Scene entity metadata
        properties:
          id:
            type: string
            description: Entity ID (IPFS hash)
          type:
            type: string
            description: Entity type (e.g., 'scene')
          timestamp:
            type: number
            description: Unix timestamp in milliseconds
          pointers:
            type: array
            items:
              type: string
            description: Pointers (coordinates or names)
          content:
            type: array
            items:
              type: object
              properties:
                file:
                  type: string
                hash:
                  type: string
          metadata:
            type: object
            description: Scene metadata
  
      Permissions:
        type: object
        description: World permissions configuration
        properties:
          deployment:
            $ref: '#/components/schemas/AllowListPermissionSetting'
          access:
            oneOf:
              - $ref: '#/components/schemas/UnrestrictedPermissionSetting'
              - $ref: '#/components/schemas/AllowListPermissionSetting'
              - $ref: '#/components/schemas/SharedSecretPermissionSetting'
              - $ref: '#/components/schemas/NFTOwnershipPermissionSetting'
          streaming:
            oneOf:
              - $ref: '#/components/schemas/UnrestrictedPermissionSetting'
              - $ref: '#/components/schemas/AllowListPermissionSetting'
  
      UnrestrictedPermissionSetting:
        type: object
        properties:
          type:
            type: string
            enum: [unrestricted]
        required:
          - type
  
      AllowListPermissionSetting:
        type: object
        properties:
          type:
            type: string
            enum: [allow-list]
          wallets:
            type: array
            items:
              type: string
            description: List of Ethereum addresses
          communities:
            type: array
            items:
              type: string
            description: List of community IDs. Users who are members of any of these communities will have access. Maximum 50 communities allowed.
            maxItems: 50
        required:
          - type
          - wallets
  
      SharedSecretPermissionSetting:
        type: object
        description: |
          Password-based access restriction. The secret is bcrypt-hashed before storage.
          Access validation is enforced by comms-gatekeeper at connection time, NOT by this
          server's HTTP API. There is no dedicated HTTP endpoint on this server for presenting
          the secret — clients submit it through the comms connection flow.
        properties:
          type:
            type: string
            enum: [shared-secret]
          secret:
            type: string
            description: Bcrypt-hashed secret (only set on creation, not returned in GET responses)
        required:
          - type
  
      NFTOwnershipPermissionSetting:
        type: object
        description: |
          NFT-gated access restriction. Access is granted to wallets that own the specified NFT.
          NOTE: NFT ownership verification in the access checker is currently a partial implementation
          (returns false as a TODO). Access validation is enforced by comms-gatekeeper at connection time.
        properties:
          type:
            type: string
            enum: [nft-ownership]
          nft:
            type: string
            description: NFT URN (e.g. urn:decentraland:matic:collections-v2:0x...:tokenId)
        required:
          - type
          - nft
  
      PermissionParcelsInput:
        type: object
        description: Request body for adding or removing parcels to/from a permission (POST/DELETE address parcels).
        properties:
          parcels:
            type: array
            items:
              type: string
              pattern: '^-?\\d+,-?\\d+$'
              description: Parcel coordinate (e.g. "0,0", "-1,2")
            minItems: 1
            maxItems: 500
        required:
          - parcels
        additionalProperties: false
  
      WalletStats:
        type: object
        description: Storage statistics for a wallet
        properties:
          wallet:
            type: string
            description: Ethereum address
          dclNames:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: string
                  description: Size in bytes as string
          ensNames:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: string
                  description: Size in bytes as string
          usedSpace:
            type: string
            description: Total used space in bytes as string
          maxAllowedSpace:
            type: string
            description: Maximum allowed space in bytes as string
          blockedSince:
            type: string
            format: date-time
            nullable: true
            description: ISO timestamp when wallet was blocked
  
      ContributorDomain:
        type: object
        properties:
          name:
            type: string
            description: Domain name
          user_permissions:
            type: array
            items:
              type: string
            description: Permissions the user has for this domain
          owner:
            type: string
            description: Owner address
          size:
            type: string
            description: Size in bytes as string
  
      StatusResponse:
        type: object
        description: Server status information
        properties:
          content:
            type: object
            properties:
              commitHash:
                type: string
                description: Git commit hash of deployed version
              worldsCount:
                type: object
                properties:
                  ens:
                    type: integer
                    description: Number of ENS worlds
                  dcl:
                    type: integer
                    description: Number of DCL worlds
          comms:
            type: object
            properties:
              adapterType:
                type: string
              statusUrl:
                type: string
              commitHash:
                type: string
                nullable: true
              users:
                type: integer
                description: Number of connected users
              rooms:
                type: integer
                description: Number of active rooms
              timestamp:
                type: number
                description: Unix timestamp in milliseconds
  
      WorldsIndex:
        type: object
        description: Index of all deployed worlds
        properties:
          index:
            type: array
            items:
              $ref: '#/components/schemas/WorldData'
          timestamp:
            type: number
            description: Unix timestamp in milliseconds
  
      WorldData:
        type: object
        properties:
          name:
            type: string
            description: World name
          scenes:
            type: array
            items:
              $ref: '#/components/schemas/SceneData'
  
      SceneData:
        type: object
        properties:
          id:
            type: string
            description: Scene entity ID
          title:
            type: string
            description: Scene title
          description:
            type: string
            description: Scene description
          thumbnail:
            type: string
            nullable: true
            description: Thumbnail image hash
          pointers:
            type: array
            items:
              type: string
            description: Scene pointers
          timestamp:
            type: number
            description: Deployment timestamp
          runtimeVersion:
            type: string
            nullable: true
            description: Scene runtime version
  
      WorldStatus:
        type: object
        properties:
          worldName:
            type: string
            description: Name of the world
          users:
            type: integer
            description: Number of users in the world
  
      ErrorResponse:
        type: object
        properties:
          error:
            type: string
            description: Error type
          message:
            type: string
            description: Error message
  
      WorldSettings:
        type: object
        description: World settings configuration that defines how the world behaves and appears in Places
        properties:
          title:
            type: string
            description: The title of the world displayed in Places
            example: 'My Awesome World'
            nullable: true
          description:
            type: string
            description: A description of the world displayed in Places
            example: 'A beautiful world with amazing experiences'
            nullable: true
          contentRating:
            type: string
            description: Content rating for the world
            example: 'T'
            nullable: true
          spawnCoordinates:
            type: string
            description: |
              The parcel coordinate where players will spawn.
              Must be within the world shape rectangle (the bounding box covering all deployed scene parcels).
              Does not need to be on a specific scene parcel, just anywhere within the rectangle.
              Supports both positive and negative coordinates (e.g., "10,20" or "-5,-10").
            pattern: '^-?\d+,-?\d+$'
            example: '10,20'
            nullable: true
          skyboxTime:
            type: number
            description: Fixed skybox time (0-24 hours). Null to use dynamic day/night cycle.
            example: 12.5
            nullable: true
          categories:
            type: array
            items:
              type: string
            description: Categories/tags for the world
            example: ['game', 'adventure']
            nullable: true
          singlePlayer:
            type: boolean
            description: Whether the world is single player only
            example: false
            nullable: true
          showInPlaces:
            type: boolean
            description: Whether the world should be shown in Places
            example: true
            nullable: true
          thumbnailUrl:
            type: string
            description: URL of the world thumbnail image
            example: 'https://worlds-content-server.decentraland.org/contents/world-thumbnails/my-world.dcl.eth/abc123'
            nullable: true
  
      WorldSettingsInput:
        type: object
        description: |
          Input for updating world settings via multipart/form-data.
          All fields are optional to allow partial updates.
  
          Note: This is sent as multipart/form-data, not JSON, to support thumbnail file uploads.
  
          **Clearing nullable fields:**
          - Send `skybox_time` with the string value `"null"` to reset to dynamic day/night cycle.
          - Send `categories` with the string value `"null"` to clear all categories (stores an empty array).
        properties:
          title:
            type: string
            description: The title of the world. Must be between 3 and 100 characters. Empty strings are rejected with a 400 error.
            minLength: 3
            maxLength: 100
          description:
            type: string
            description: A description of the world. Must be between 3 and 1000 characters. Empty strings are rejected with a 400 error.
            minLength: 3
            maxLength: 1000
          content_rating:
            type: string
            description: Content rating for the world
          spawn_coordinates:
            type: string
            description: |
              The parcel coordinate where players will spawn.
              Must be within the world shape rectangle.
            pattern: '^-?\d+,-?\d+$'
            example: '10,20'
          skybox_time:
            type: string
            description: Fixed skybox time as a number string (0-24 hours). Send the string "null" to reset to dynamic day/night cycle.
            example: '12'
          categories:
            type: string
            description: Category values as repeated multipart fields, or the string "null" to clear all categories (stores an empty array).
            example: 'art'
          single_player:
            type: string
            description: Single player mode ("true" or "false")
            example: 'false'
          show_in_places:
            type: string
            description: Show in places ("true" or "false")
            example: 'true'
          thumbnail:
            type: string
            format: binary
            description: Thumbnail image file (max 1MB)
  
      GetWorldScenesRequestBody:
        type: object
        description: Body for POST /world/{world_name}/scenes.
        properties:
          coordinates:
            type: array
            items:
              type: string
              pattern: '^-?\d+,-?\d+$'
              description: Parcel coordinate (e.g. "0,0", "-1,2")
            description: Return only scenes that contain any of these coordinates
        required:
          - coordinates
        additionalProperties: false
  
      WorldsResponse:
        type: object
        description: Paginated response containing worlds information
        properties:
          worlds:
            type: array
            items:
              $ref: '#/components/schemas/WorldInfo'
            description: List of worlds
          total:
            type: integer
            description: Total number of worlds matching the query (for pagination)
        required:
          - worlds
          - total
  
      WorldInfo:
        type: object
        description: Information about a world including settings and deployment status
        properties:
          name:
            type: string
            description: The world name (ENS or DCL domain)
            example: my-world.dcl.eth
          owner:
            type: string
            description: Ethereum address of the world owner
            example: '0x1234567890123456789012345678901234567890'
          title:
            type: string
            nullable: true
            description: The title of the world
            example: My Awesome World
          description:
            type: string
            nullable: true
            description: A description of the world
            example: A beautiful virtual world
          shape:
            type: object
            nullable: true
            description: |
              The bounding rectangle of the world in parcel coordinates.
              Null if the world has no deployed scenes.
            properties:
              x1:
                type: integer
                description: Minimum x coordinate
                example: 0
              x2:
                type: integer
                description: Maximum x coordinate
                example: 2
              y1:
                type: integer
                description: Minimum y coordinate
                example: 0
              y2:
                type: integer
                description: Maximum y coordinate
                example: 1
          content_rating:
            type: string
            nullable: true
            description: Content rating for the world
            example: T
          spawn_coordinates:
            type: string
            nullable: true
            description: The parcel coordinate where players will spawn
            pattern: '^-?\d+,-?\d+$'
            example: '10,20'
          skybox_time:
            type: number
            nullable: true
            description: Fixed skybox time (0-24 hours)
            example: 12
          categories:
            type: array
            nullable: true
            items:
              type: string
            description: Categories/tags for the world
            example: ['game', 'adventure']
          single_player:
            type: boolean
            nullable: true
            description: Whether the world is single player only
            example: false
          show_in_places:
            type: boolean
            nullable: true
            description: Whether the world should be shown in Places
            example: true
          thumbnail_hash:
            type: string
            nullable: true
            description: IPFS hash of the world thumbnail image
            example: bafkreiabi74jam7uh5gmm6x4hox664j53bmt7dy4alrltkhyj3ozcxs2iu
          last_deployed_at:
            type: string
            format: date-time
            nullable: true
            description: |
              ISO 8601 timestamp of the last scene deployment.
              Null if the world has no deployed scenes.
            example: '2024-01-15T10:30:00.000Z'
          blocked_since:
            type: string
            format: date-time
            nullable: true
            description: |
              ISO 8601 timestamp when the world owner was blocked.
              Null if the owner is not blocked.
            example: null
          deployed_scenes:
            type: integer
            description: The number of scenes deployed to the world
            example: 2
        required:
          - name
          - owner
          - title
          - description
          - shape
          - content_rating
          - spawn_coordinates
          - skybox_time
          - categories
          - single_player
          - show_in_places
          - thumbnail_hash
          - last_deployed_at
          - blocked_since
          - deployed_scenes

ai_context: |
  # AI Agent Context
  
  **Service Purpose:** Content server specifically for Decentraland Worlds (named scenes). Enables deployment and retrieval of world scenes that are identified by DCL names rather than parcel coordinates. Supports global portable experiences and single-scene loading.
  
  **Key Capabilities:**
  
  - Stores and serves World entity deployments (scenes associated with DCL names)
  - Validates deployment ownership (deployer must own the DCL name in scene.json)
  - Provides content retrieval API for world scenes
  - Supports addressable URNs for global portable experiences and single-scene loading
  - Uses @dcl/catalyst-storage for entity storage (disk or S3)
  
  **Communication Pattern:** Synchronous HTTP REST API
  
  **Technology Stack:**
  
  - Runtime: Node.js
  - Language: TypeScript
  - HTTP Framework: @well-known-components/http-server
  - Storage: @dcl/catalyst-storage (entity content storage)
  - Component Architecture: @well-known-components (logger, metrics, http-server)
  
  **External Dependencies:**
  
  - Database: PostgreSQL (world metadata, permissions, blocked wallets)
  - Storage: Local disk or AWS S3 (via @dcl/catalyst-storage)
  - Blockchain: DCL Names ownership validation (deployer must own name)
  - Communication: LiveKit (optional, for comms adapter configuration)
  
  **Key Concepts:**

  - **World**: A scene identified by a DCL name rather than parcel coordinates
  - **Addressable URN**: Entity URN format enabling global portable experiences and single-scene loading
  - **Global Portable Experience**: Experiences loaded for all users (via GLOBAL_PX query parameter)
  - **Single Scene**: Load a specific scene instead of Genesis City (via SPACE query parameter)

  **Private Worlds / Access Restrictions:**

  - Worlds can restrict visitor access via `worlds.access` (JSONB): `unrestricted`, `allow-list`, `shared-secret`, or `nft-ownership`
  - **This server's HTTP API does NOT enforce access restrictions.** Public endpoints (`GET /worlds`, `GET /world/{name}/about`) always return world data regardless of access settings — private worlds are still publicly discoverable via the API
  - Access restriction enforcement happens at **comms-gatekeeper** at WebRTC/LiveKit connection time; this server exposes `GET /world/{name}/permissions` so comms-gatekeeper can validate access
  - `WorldInfo` (returned by `GET /worlds`) does NOT include the world's access type — callers must query `GET /world/{name}/permissions` separately to determine if a world is private
  - `nft-ownership` access type is partially implemented (access checker currently returns `false` as a TODO)
  
  **Deployment Requirements:**
  
  - Deployer wallet must own the DCL name specified in scene.json
  - World name in scene.json must match owned DCL name
  
  **Database Schema:**
  
  - **Tables**: `worlds` (world-level config and access settings), `world_scenes` (scene deployments), `world_permissions` (deployment/streaming grants), `world_permission_parcels` (parcel-level restrictions), `blocked` (blocked wallets)
  - **Key Columns**: `worlds.name` (PK), `worlds.access` (JSONB NOT NULL — stores access control settings), `worlds.owner`; scene data (`entity_id`, `size`, `deployer`, `parcels`) lives in `world_scenes`, not `worlds`
  - **Access vs Permissions**: `worlds.access` (JSONB) stores visitor access settings (unrestricted/allow-list/shared-secret/nft-ownership); `world_permissions` table stores deployment and streaming grants (allow-list only)
  - **Full Documentation**: See [docs/database-schema.md](docs/database-schema.md) for detailed schema, column definitions, and relationships
  
  ## Database Notes for AI Agents
  
  1. **Case Sensitivity**: All world names and Ethereum addresses are stored in lowercase
  2. **JSON/JSONB Columns**: `worlds.access` (JSONB) stores visitor access settings; `world_scenes.entity` (JSONB) and `world_scenes.deployment_auth_chain` (JSON) store scene data
  3. **Null Handling**: `entity_id` can be NULL if a world record exists but no deployment has been made
  4. **Size Calculation**: The `size` field is computed from content file sizes, not stored directly in entity
  5. **Permission Validation**: Deployment/streaming permission checks handled in application layer (`src/logic/permissions-checker.ts`); access (visitor) restrictions validated via `src/logic/access-checker/component.ts`
  6. **Owner Validation**: The `owner` field is validated against blockchain via `nameOwnership` component
  7. **Migration System**: Migrations are auto-executed on startup via `migrationExecutor` component
  8. **Storage Separation**: Entity content files are stored separately in S3/disk storage, not in the database

readme: |
  # Worlds Content Server
  
  [![Coverage Status](https://coveralls.io/repos/github/decentraland/worlds-content-server/badge.svg?branch=main)](https://coveralls.io/github/decentraland/worlds-content-server?branch=main)
  
  Content server specifically for Decentraland Worlds (named scenes). Enables deployment and retrieval of world scenes that are identified by DCL names rather than parcel coordinates. Supports global portable experiences and single-scene loading.
  
  This server interacts with DCL Names (ENS) for ownership validation, LiveKit for communications, and AWS S3 for content storage in order to provide users with the ability to deploy and manage isolated 3D scenes outside of Genesis City.
  
  ## Table of Contents
  
  - [Worlds Content Server](#worlds-content-server)
    - [Table of Contents](#table-of-contents)
    - [Features](#features)
    - [Dependencies](#dependencies)
    - [API Documentation](#api-documentation)
    - [Database](#database)
    - [Schema](#schema)
    - [Migrations](#migrations)
    - [Getting Started](#getting-started)
      - [Prerequisites](#prerequisites)
      - [Installation](#installation)
      - [Configuration](#configuration)
      - [Running the Service](#running-the-service)
        - [Setting up the environment](#setting-up-the-environment)
        - [Running in development mode](#running-in-development-mode)
        - [Running in production mode](#running-in-production-mode)
    - [Deploying Entities](#deploying-entities)
      - [Deploying using the CLI tool](#deploying-using-the-cli-tool)
      - [Addressable URNs](#addressable-urns)
      - [Using Addressable URNs](#using-addressable-urns)
    - [Testing](#testing)
      - [Running Tests](#running-tests)
      - [Test Structure](#test-structure)
    - [AI Agent Context](#ai-agent-context)
  
  ## Features
  
  - **World Deployment**: Deploy and manage 3D scenes linked to Decentraland NAMEs (ENS or DCL domains)
  - **Access Control**: Configure granular permissions for deployment, access, and streaming (allow-list, unrestricted, shared-secret, NFT ownership)
  - **Content Storage**: Store and retrieve scene assets via IPFS-compatible content addressing using `@dcl/catalyst-storage` (disk or S3)
  - **Addressable URNs**: Support for global portable experiences and single-scene loading via addressable URN format
  - **Ownership Validation**: Validates that deployer wallet owns the DCL name specified in scene.json
  - **Live Data**: Real-time information about active worlds and connected users
  - **Communications Service**: Built-in communications adapter integration (LiveKit, WebRTC)
  
  ## Dependencies
  
  - **[Catalyst](https://github.com/decentraland/catalyst)**: Uses similar entity storage patterns and validation logic
  - **[DCL Names/ENS](https://ens.domains/)**: Validates ownership of DCL names for deployment authorization
  - **[LiveKit](https://livekit.io/)**: Optional communications adapter for multi-user experiences
  - **[AWS SNS](https://aws.amazon.com/sns/)**: Publishes deployment notifications
  - **PostgreSQL**: Database for world metadata, permissions, and blocked wallets
  - **NATS**: Message broker for internal event handling
  - **AWS S3** (optional): Cloud storage backend via `@dcl/catalyst-storage`
  - **Local Disk Storage** (default): File system storage via `@dcl/catalyst-storage`
  
  ## API Documentation
  
  The API is fully documented using the [OpenAPI standard](https://swagger.io/specification/). Its schema is located at [docs/openapi.yaml](docs/openapi.yaml).
  
  ## Database
  
  ### Schema
  
  See [docs/database-schema.md](docs/database-schema.md) for detailed schema, column definitions, and relationships.
  
  ### Migrations
  
  The service uses `node-pg-migrate` for database migrations. These migrations are located in `src/migrations/`. The service automatically runs the migrations when starting up.
  
  #### Create a new migration
  
  Migrations are created by running the create command:
  
  ```bash
  yarn migrate create name-of-the-migration
  ```
  
  This will result in the creation of a migration file inside of the `src/migrations/` directory. This migration file MUST contain the migration set up and rollback procedures.
  
  #### Manually applying migrations
  
  If required, these migrations can be run manually.
  
  To run them manually:
  
  ```bash
  yarn migrate up
  ```
  
  To rollback them manually:
  
  ```bash
  yarn migrate down
  ```
  
  ## Getting Started
  
  ### Prerequisites
  
  Before running this service, ensure you have the following installed:
  
  - **Node.js**: Version 22.x or higher (LTS recommended)
  - **Yarn**: Version 1.22.x or higher
  - **Docker**: For containerized deployment and local development dependencies
  - **PostgreSQL**: Version 14+ (or use Docker Compose)
  
  ### Installation
  
  1. Clone the repository:
  
  ```bash
  git clone https://github.com/decentraland/worlds-content-server.git
  cd worlds-content-server
  ```
  
  2. Install dependencies:
  
  ```bash
  yarn install
  ```
  
  3. Build the project:
  
  ```bash
  yarn build
  ```
  
  ### Configuration
  
  The service uses environment variables for configuration. Copy the example file and adjust as needed:
  
  ```bash
  cp .env.default .env
  ```
  
  See `.env.default` for available configuration options.
  
  ### Running the Service
  
  #### Setting up the environment
  
  In order to successfully run this server, external dependencies such as databases, message brokers, and storage must be provided.
  
  To do so, this repository provides you with a `docker-compose.yml` file for that purpose. In order to get the environment set up, run:
  
  ```bash
  docker-compose up -d
  ```
  
  This will start:
  - PostgreSQL database on port `5450`
  - NATS message broker on port `4222`
  
  #### Running in development mode
  
  To run the service in development mode:
  
  ```bash
  yarn dev
  ```
  
  This will:
  - Watch for file changes
  - Automatically rebuild TypeScript
  - Restart the server on changes
  
  #### Running in production mode
  
  For production deployment, use the Docker image:
  
  ```bash
  docker pull quay.io/decentraland/worlds-content-server
  docker run --name wcs -p 3000:3000 \
    --env COMMS_ADAPTER=livekit \
    --env LIVEKIT_HOST=<your livekit url> \
    --env LIVEKIT_API_KEY=<your api key> \
    --env LIVEKIT_API_SECRET=<your secret> \
    quay.io/decentraland/worlds-content-server
  ```
  
  ## Deploying Entities
  
  For a deployment to be accepted by this server, the wallet deploying must own a DCL name. The scene must specify the name of the world in `scene.json`, and that DCL name must be owned by the wallet signing the deployment.
  
  For more details on deploying scenes, please check out [the documentation](https://docs.decentraland.org/creator/worlds/about/#publish-a-world).
  
  ### Deploying using the CLI tool
  
  Once your signer address owns a DCL name, you can deploy to this server using the CLI tool:
  
  ```bash
  # cd into your scene
  cd my-scene
  
  # then deploy
  export DCL_PRIVATE_KEY=0x....
  dcl deploy --target-content https://worlds-content-server.decentraland.org
  ```
  
  Upon successful deployment, the latest version of the CLI should print some helpful information about how to preview the scene along with the addressable URN of the deployment.
  
  ### Addressable URNs
  
  A deployment in Decentraland can live anywhere as long as it complies with the format. To consistently identify deployments and their location in servers, the concept of addressable URN is introduced.
  
  Let a valid deployment URN be:
  ```
  urn:decentraland:entity:bafkreihpipyhrt75xyquwrynrtjadwb373xfosy7a5rhlh5vogjajye3im
  ```
  
  That deployment will be downloaded from the configured content server by default. But for testing purposes, a baseUrl query parameter can be added: `?baseUrl=https://worlds-content-server.decentraland.org/contents/` yielding a full URN like this:
  
  ```
  urn:decentraland:entity:bafkreihpipyhrt75xyquwrynrtjadwb373xfosy7a5rhlh5vogjajye3im?=&baseUrl=https://worlds-content-server.decentraland.org/contents/
  ```
  
  ### Using Addressable URNs
  
  There are two ways to use addressable URNs:
  
  1. **Global Portable Experiences**: Generate experiences for all users (e.g., event calendars)
     - Test by adding `GLOBAL_PX=<urn>` query parameter to the explorer
     - Example: `https://play.decentraland.zone/?GLOBAL_PX=urn:decentraland:entity:...?=&baseUrl=https://worlds-content-server.decentraland.org/contents/`
  
  2. **Single Scene Loading**: Load a specific scene instead of the full Genesis City
     - Test by adding `SPACE=<urn>` query parameter
     - Example: `https://play.decentraland.zone/?SPACE=urn:decentraland:entity:...?=&baseUrl=https://worlds-content-server.decentraland.org/contents/`
  
  Portable experiences and single scenes (spaces) can be used at the same time to generate dynamic experiences.
  
  ## Testing
  
  This service includes comprehensive test coverage with both unit and integration tests.
  
  ### Running Tests
  
  Run all tests with coverage:
  
  ```bash
  yarn test
  ```
  
  Run tests in watch mode:
  
  ```bash
  yarn test --watch
  ```
  
  Run only unit tests:
  
  ```bash
  yarn test test/unit
  ```
  
  Run only integration tests:
  
  ```bash
  yarn test test/integration
  ```
  
  ### Test Structure
  
  - **Unit Tests** (`test/unit/`): Test individual components and functions in isolation
  - **Integration Tests** (`test/integration/`): Test the complete request/response cycle
  
  For detailed testing guidelines and standards, refer to our [Testing Standards](https://github.com/decentraland/docs/tree/main/development-standards/testing-standards) documentation.
  
  ## AI Agent Context
  
  For detailed AI Agent context, see [docs/ai-agent-context.md](docs/ai-agent-context.md).

extra_docs:
  docs_about_md: |
    ---
    title: "About"
    slug: "/contributor/catalyst/about"
    ---
    
    In this document you will learn how to use Decentraland Worlds, a new content server that lets you deploy isolated scenes which are accessible by the Decentraland explorer. 
    
    The name **Worlds** was given to scenes that exists outside the Genesis City boundaries. Worlds can be used to do experiments or as a Scenes Preview Service to tests experiences before uploading them to the Genesis City. Worlds are attached to [Decentraland NAMEs](https://builder.decentraland.org/names) and the NAMEs can be used as realms.  
    
    ### WARNINGS: The Worlds server is in ALPHA version
    
    - Do not build product road map on top of this service
    - In order scale this service and making it globally available some cost or limitations may be needed in the future to support the infrastructure 
    - There can be bugs or downtime, the goal is to detect issues and fixe them as soon as possible 
    - The future User Experience may change based on the feedback 
    
    
    ### Publish a scene 
    
    If you are a content creator, you are already familiar with the CLI, the only difference to upload a Worlds is that you need to specify the target server and use the Worlds server URL. 
    
    `dcl deploy --target-content https://worlds-content-server.decentraland.org` 
    
    The only validation that is going to be made when uploading content to the Worlds Server is that you own a Decentraland NAME as that NAME is going to be the key to access the scene. 
    
    
    ### Joining a World 
    
    Once a scene is uploaded to the Worlds server you can access it by using the Decentraland explorer and adding the NAME as the value for the realm query parameter in the URL, for example, if your name is `my-name.dcl.eth` you can use the following URL:  `https://play.decentraland.org/?realm=my-name.dcl.eth`. Another possibility is to just enter Decentraland and type the `/changerealm my-name.dcl.eth` command in the chat and this will teleport your scene. 
    
    
    ### Limitations: 
    
    - Even if you withhold more than one name, only one deployment per account is supported at this time.
    - The upload size limit is the same as a deployment to a Catalyst (200MB) 
    - Once uploaded, it cannot be destroyed, but you may override it with a new deployment

  docs_database-schema_md: |
    # Database Schema Documentation
    
    This document describes the database schema for the Worlds Content Server. The schema uses PostgreSQL and is managed through migrations located in `src/migrations/`.
    
    ## Tables Overview
    
    The database contains the following main tables:
    
    1. **`worlds`** - Stores world metadata and access settings
    2. **`world_scenes`** - Stores individual scene deployments within worlds (multi-scene support)
    3. **`world_permissions`** - Stores deployment and streaming permission grants
    4. **`world_permission_parcels`** - Stores parcel-level permission restrictions (normalized)
    5. **`blocked`** - Stores blocked wallet addresses
    6. **`migrations`** - Tracks executed database migrations (internal, managed automatically)
    
    ---
    
    ## Database Schema Diagram
    
    ```mermaid
    erDiagram
        worlds {
            VARCHAR name PK "World name (DCL name)"
            JSONB access "Access control settings (NOT NULL)"
            VARCHAR owner "DCL name owner address"
            VARCHAR spawn_coordinates "Default spawn parcel coordinate"
            TIMESTAMP created_at "Creation timestamp"
            TIMESTAMP updated_at "Update timestamp"
        }
    
        world_scenes {
            VARCHAR world_name PK,FK "References worlds(name)"
            VARCHAR entity_id PK "IPFS hash (CID)"
            JSON deployment_auth_chain "ADR-44 auth chain"
            JSONB entity "Full entity JSON"
            VARCHAR deployer "Ethereum address"
            TEXT_ARRAY parcels "Parcel coordinates"
            BIGINT size "Scene size in bytes"
            TIMESTAMP created_at "Creation timestamp"
        }
    
        world_permissions {
            SERIAL id PK "Auto-increment ID"
            VARCHAR world_name FK "References worlds(name)"
            VARCHAR permission_type "deployment or streaming"
            VARCHAR address "Ethereum address (lowercase)"
            TIMESTAMP created_at "Creation timestamp"
            TIMESTAMP updated_at "Update timestamp"
        }
    
        world_permission_parcels {
            INT permission_id PK,FK "References world_permissions(id)"
            VARCHAR parcel PK "Parcel coordinate (e.g., 0,0)"
        }
    
        blocked {
            VARCHAR wallet PK "Ethereum address"
            TIMESTAMP created_at "Block timestamp"
            TIMESTAMP updated_at "Update timestamp"
        }
    
        migrations {
            SERIAL id PK "Auto-increment ID"
            VARCHAR name "Migration identifier"
            TIMESTAMP run_on "Execution timestamp"
        }
    
        worlds ||--o{ world_scenes : "contains"
        worlds ||--o{ world_permissions : "has permissions"
        world_permissions ||--o{ world_permission_parcels : "has parcels"
        worlds ||--o{ blocked : "owner checked against (application logic)"
    ```
    
    **Relationship Notes:**
    
    - `worlds` → `world_scenes`: One-to-many relationship (one world contains multiple scenes)
    - `worlds` → `world_permissions`: One-to-many relationship (one world has multiple permission grants)
    - `world_permissions` → `world_permission_parcels`: One-to-many relationship (one permission can have multiple parcels)
    - `world_scenes.world_name` references `worlds.name` with CASCADE delete
    - `world_permissions.world_name` references `worlds.name` with CASCADE delete
    - `world_permission_parcels.permission_id` references `world_permissions.id` with CASCADE delete
    - `worlds.owner` and `world_scenes.deployer` store Ethereum addresses (validated via blockchain)
    - `blocked.wallet` can be checked against `worlds.owner` for access control (application-level validation)
    - The `migrations` table is managed automatically by the migration system
    
    ---
    
    ## Table: `worlds`
    
    Stores world metadata and access settings. With multi-scene support, this table contains world-level configuration while individual scenes are stored in `world_scenes`.
    
    ### Columns
    
    | Column              | Type      | Nullable     | Description                                                                              |
    | ------------------- | --------- | ------------ | ---------------------------------------------------------------------------------------- |
    | `name`              | VARCHAR   | NOT NULL     | **Primary Key**. World name (DCL name, e.g., `"myworld.dcl.eth"`). Stored in lowercase.  |
    | `access`            | JSONB     | **NOT NULL** | Access control settings. See [Access Settings](#access-settings) below.                  |
    | `owner`             | VARCHAR   | NULL         | Ethereum address of the DCL name owner (verified via blockchain).                        |
    | `spawn_coordinates` | VARCHAR   | NULL         | World spawn parcel coordinate (e.g., `"0,0"`). Must belong be a coordinate inside of the world's shape. |
    | `created_at`        | TIMESTAMP | NOT NULL     | Timestamp when the world record was first created.                                       |
    | `updated_at`        | TIMESTAMP | NOT NULL     | Timestamp when the world record was last updated.                                        |
    
    ### Indexes
    
    - **Primary Key**: `name`
    
    ### Access Settings
    
    The `access` column stores a JSON object controlling who can visit/access the world:
    
    ```typescript
    type AccessSetting =
      | UnrestrictedAccessSetting
      | SharedSecretAccessSetting
      | NftOwnershipAccessSetting
      | AllowListAccessSetting
    ```
    
    #### Access Types
    
    1. **Unrestricted** - Anyone can access
    
       ```json
       {
         "type": "unrestricted"
       }
       ```
    
    2. **AllowList** - Only specified wallets can access
    
       ```json
       {
         "type": "allow-list",
         "wallets": ["0x...", "0x..."]
       }
       ```
    
    3. **SharedSecret** - Access requires a secret password
    
       ```json
       {
         "type": "shared-secret",
         "secret": "bcrypt-hashed-secret"
       }
       ```
    
    4. **NFTOwnership** - Access requires ownership of a specific NFT
    
       ```json
       {
         "type": "nft-ownership",
         "nft": "urn:decentraland:matic:collections-v2:0x...:1"
       }
       ```
    
    #### Default Access
    
    ```json
    {
      "type": "unrestricted"
    }
    ```
    
    ---
    
    ## Table: `world_scenes`
    
    Stores individual scene deployments within worlds. Each world can have multiple scenes deployed to different parcels.
    
    ### Columns
    
    | Column                  | Type      | Nullable | Description                                                                                  |
    | ----------------------- | --------- | -------- | -------------------------------------------------------------------------------------------- |
    | `world_name`            | VARCHAR   | NOT NULL | **Primary Key (part 1)**, **Foreign Key** → `worlds(name)`. The world this scene belongs to. |
    | `entity_id`             | VARCHAR   | NOT NULL | **Primary Key (part 2)**. IPFS hash (CID) of the deployed scene entity.                      |
    | `deployment_auth_chain` | JSON      | NOT NULL | Authentication chain used for deployment. Array of `AuthLink` objects following ADR-44.      |
    | `entity`                | JSONB     | NOT NULL | Full entity JSON object containing scene metadata, content mappings, and all entity data.    |
    | `deployer`              | VARCHAR   | NOT NULL | Ethereum address of the wallet that deployed this scene.                                     |
    | `parcels`               | TEXT[]    | NOT NULL | Array of parcel coordinates this scene occupies (e.g., `['0,0', '0,1', '1,0']`).             |
    | `size`                  | BIGINT    | NOT NULL | Total size of this scene's content files in bytes.                                           |
    | `created_at`            | TIMESTAMP | NOT NULL | Timestamp when the scene was first deployed.                                                 |
    
    ### Indexes
    
    - **Primary Key**: `(world_name, entity_id)` (composite primary key)
    - **Index**: `world_scenes_world_name_idx` on `world_name` column
    - **GIN Index**: `world_scenes_parcels_idx` on `parcels` column (for array operations)
    - **Index**: `world_scenes_deployer_idx` on `deployer` column
    
    ### Constraints
    
    - **Foreign Key**: `world_name` REFERENCES `worlds(name)` ON DELETE CASCADE
      - When a world is deleted, all its scenes are automatically deleted
    
    ### Entity Structure
    
    The `entity` column stores the full Decentraland entity JSON. Key fields include:
    
    ```json
    {
      "id": "bafkreihpipyhrt75xyquwrynrtjadwb373xfosy7a5rhlh5vogjajye3im",
      "type": "scene",
      "timestamp": 1699123456789,
      "pointers": ["myworld.dcl.eth"],
      "content": [
        {
          "file": "scene.json",
          "hash": "QmHash..."
        },
        {
          "file": "models/scene.glb",
          "hash": "QmHash..."
        }
      ],
      "metadata": {
        "worldConfiguration": {
          "minimap": { ... },
          "skybox": { ... }
        },
        "owner": "0x..."
      }
    }
    ```
    
    ### Deployment Auth Chain Structure
    
    The `deployment_auth_chain` column stores an array of authentication links:
    
    ```json
    [
      {
        "type": "SIGNER",
        "payload": "0xd9b96b5dc720fc52bede1ec3b40a930e15f70ddd",
        "signature": ""
      },
      {
        "type": "ECDSA_PERSONAL_EPHEMERAL",
        "payload": "Decentraland Login\nEphemeral address: 0x...\nExpiration: ...",
        "signature": "0x..."
      }
    ]
    ```
    
    ---
    
    ## Table: `world_permissions`
    
    Stores deployment and streaming permission grants for worlds. Each record represents a single wallet's permission to deploy or stream to a world.
    
    ### Columns
    
    | Column            | Type      | Nullable | Description                                                               |
    | ----------------- | --------- | -------- | ------------------------------------------------------------------------- |
    | `id`              | SERIAL    | NOT NULL | **Primary Key**. Auto-incrementing unique identifier.                     |
    | `world_name`      | VARCHAR   | NOT NULL | **Foreign Key** → `worlds(name)`. The world this permission belongs to.   |
    | `permission_type` | VARCHAR   | NOT NULL | Type of permission: `'deployment'` or `'streaming'`.                      |
    | `address`         | VARCHAR   | NOT NULL | Ethereum address of the wallet being granted permission (lowercase).      |
    | `created_at`      | TIMESTAMP | NOT NULL | Timestamp when the permission was granted.                                |
    | `updated_at`      | TIMESTAMP | NOT NULL | Timestamp when the permission was last updated.                           |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Unique Constraint**: `(world_name, permission_type, address)` - Each wallet can only have one permission record per type per world
    - **Index**: `world_permissions_address_idx` on `address` column (for fast wallet lookups)
    - **Index**: `world_permissions_world_permission_idx` on `(world_name, permission_type)` (for listing permissions)
    
    ### Constraints
    
    - **Foreign Key**: `world_name` REFERENCES `worlds(name)` ON DELETE CASCADE
      - When a world is deleted, all its permissions are automatically deleted
    
    ---
    
    ## Table: `world_permission_parcels`
    
    Stores parcel-level restrictions for permissions. When a permission has entries in this table, the wallet can only deploy/stream to those specific parcels. When no entries exist, the permission is "world-wide" (can access all parcels).
    
    ### Columns
    
    | Column          | Type    | Nullable | Description                                                                     |
    | --------------- | ------- | -------- | ------------------------------------------------------------------------------- |
    | `permission_id` | INT     | NOT NULL | **Primary Key (part 1)**, **Foreign Key** → `world_permissions(id)`.            |
    | `parcel`        | VARCHAR | NOT NULL | **Primary Key (part 2)**. Parcel coordinate (e.g., `"0,0"`, `"-5,10"`).         |
    
    ### Indexes
    
    - **Primary Key**: `(permission_id, parcel)` (composite primary key)
    - **Index**: `world_permission_parcels_parcel_idx` on `parcel` column (for parcel lookups)
    
    ### Constraints
    
    - **Foreign Key**: `permission_id` REFERENCES `world_permissions(id)` ON DELETE CASCADE
      - When a permission is deleted, all its parcel entries are automatically deleted
    
    ### Permission Checking Logic
    
    When checking if a wallet can deploy/stream to parcels `["0,0", "1,0"]`:
    
    1. **World-wide permission**: If no entries exist in `world_permission_parcels` for this permission → ✅ Allowed for all parcels
    2. **Parcel-specific permission**: If entries exist in `world_permission_parcels`:
       - Check if all target parcels are in the table for this permission
       - If yes → ✅ Allowed
       - If any parcel is missing → ❌ Denied
    
    ### Example Data
    
    **world_permissions table:**
    
    | id  | world_name      | permission_type | address        |
    | --- | --------------- | --------------- | -------------- |
    | 1   | myworld.dcl.eth | deployment      | 0xadmin1...    |
    | 2   | myworld.dcl.eth | deployment      | 0xbuilder1...  |
    | 3   | myworld.dcl.eth | streaming       | 0xstreamer1... |
    | 4   | myworld.dcl.eth | streaming       | 0xstreamer2... |
    
    **world_permission_parcels table:**
    
    | permission_id | parcel |
    | ------------- | ------ |
    | 2             | 0,0    |
    | 2             | 1,0    |
    | 2             | 0,1    |
    | 4             | 0,0    |
    
    In this example:
    - `0xadmin1...` has world-wide deployment permission (no parcels in `world_permission_parcels` for id=1)
    - `0xbuilder1...` can only deploy to parcels `0,0`, `1,0`, and `0,1`
    - `0xstreamer1...` has world-wide streaming permission (no parcels for id=3)
    - `0xstreamer2...` can only stream to parcel `0,0`
    
    ### Business Rules
    
    1. **Address Normalization**: All addresses are stored in lowercase
    2. **World-wide vs Parcel-specific**:
       - No rows in `world_permission_parcels` = world-wide permission (can access any parcel)
       - Rows exist = parcel-specific permission (can only access those parcels)
    3. **Unique Permission**: A wallet can only have one deployment and one streaming permission per world
    
    ---
    
    ## Table: `blocked`
    
    Stores wallet addresses that have been blocked from deploying or accessing worlds.
    
    ### Columns
    
    | Column       | Type      | Nullable | Description                                                          |
    | ------------ | --------- | -------- | -------------------------------------------------------------------- |
    | `wallet`     | VARCHAR   | NOT NULL | **Primary Key**. Ethereum address of the blocked wallet (lowercase). |
    | `created_at` | TIMESTAMP | NOT NULL | Timestamp when the wallet was first blocked.                         |
    | `updated_at` | TIMESTAMP | NOT NULL | Timestamp when the block record was last updated.                    |
    
    ### Indexes
    
    - **Primary Key**: `wallet`
    - **Index**: `blocked_wallet_index` on `wallet` column
    
    ### Business Rules
    
    1. Wallet addresses are stored in lowercase
    2. Blocked wallets are checked before allowing deployments and access
    
    ---
    
    ## Table: `migrations` (Internal)
    
    Tracks which database migrations have been executed. This table is managed automatically by the migration system and should not be modified manually.
    
    ---
    
    ## Constraints and Business Rules
    
    1. **Name Uniqueness**: Each world name must be unique (enforced by primary key)
    2. **Name Format**: World names should be lowercase (handled by application layer)
    3. **Access Settings**: Must never be NULL (enforced by NOT NULL constraint)
    4. **Owner Validation**: The `owner` field is validated against blockchain DCL name ownership
    5. **Size Calculation**: Total world size = sum of all `world_scenes.size` for the world
    6. **Address Normalization**: All Ethereum addresses in permissions are stored in lowercase
    7. **Parcel Conflicts**: When deploying a scene, any existing scenes on the same parcels are deleted
    8. **Multi-Scene Support**: Multiple scenes can exist per world, each occupying different parcels
    9. **Spawn Coordinates**: Must reference a parcel that belongs to a deployed scene in the world
    
