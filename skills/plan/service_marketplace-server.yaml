            required: false
            description: 'Filter by seller wallet address'
            schema:
              type: string
              example: '0x1234567890abcdef1234567890abcdef12345678'
          - name: buyer
            in: query
            required: false
            description: 'Filter by buyer wallet address'
            schema:
              type: string
          - name: contractAddress
            in: query
            required: false
            description: 'Filter by NFT contract address'
            schema:
              type: string
              example: '0x1234567890abcdef1234567890abcdef12345678'
          - name: tokenId
            in: query
            required: false
            description: 'Filter by specific token ID'
            schema:
              type: string
          - name: itemId
            in: query
            required: false
            description: 'Filter by item ID'
            schema:
              type: string
          - name: from
            in: query
            required: false
            description: 'Filter sales from this Unix timestamp (in seconds)'
            schema:
              type: number
              example: 1640000000
          - name: to
            in: query
            required: false
            description: 'Filter sales up to this Unix timestamp (in seconds)'
            schema:
              type: number
              example: 1650000000
          - name: minPrice
            in: query
            required: false
            description: 'Minimum sale price filter'
            schema:
              type: string
              example: '0.1'
          - name: maxPrice
            in: query
            required: false
            description: 'Maximum sale price filter'
            schema:
              type: string
              example: '100'
          - name: network
            in: query
            required: false
            description: 'Filter by blockchain network'
            schema:
              type: string
