ai_context: |
  credits-server manages virtual currency (credits) and credit-gated operations.
  It uses an on-chain Squid Indexer (GraphQL) to query credit consumption data.

  ## Authentication patterns

  **Wallet-based whitelists (used for admin operations)**
  - Admin addresses stored in env var: `ADMIN_WHITELIST=0xAddress1,0xAddress2`
  - Parsed and validated on component initialization; only valid `0x` addresses kept
  - Middleware checks `ctx.verification.auth` (from signed fetch / ADR-44) against the list
  - Use this pattern when: < ~50 addresses, infrequent changes, no DB compromise risk
  - Prefer over DB-backed ACLs for security-critical operations where simplicity matters

  **Signed Fetch (ADR-44)** for all client-facing endpoints. Bearer tokens for service-to-service calls.
