            description: Community not found
            content:
              application/json:
                schema:
                  $ref: './schemas.yaml#/components/schemas/ErrorResponse'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: './schemas.yaml#/components/schemas/ErrorResponse'
        tags:
          - Communities
  
    /v1/communities/{id}/posts/{postId}:
      delete:
        operationId: deleteCommunityPost
        summary: Delete a community post
        description: |
          Deletes a post from a community.
          This endpoint requires Signed Fetch authentication and only community owners or moderators can delete posts.
        security:
          - SignedFetch: []
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
            description: The unique identifier of the community.
          - name: postId
            in: path
            required: true
            schema:
              type: string
            description: The unique identifier of the post.
        responses:
          '204':
            description: Post deleted successfully
          '401':
            description: Unauthorized - Signed Fetch required or insufficient permissions
            content:
              application/json:
                schema:
                  $ref: './schemas.yaml#/components/schemas/ErrorResponse'
          '404':
            description: Community or post not found
            content:
              application/json:
                schema:
                  $ref: './schemas.yaml#/components/schemas/ErrorResponse'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: './schemas.yaml#/components/schemas/ErrorResponse'
        tags:
          - Communities

ai_context: |
  # AI Agent Context
  
  **Service Purpose:** A microservice that handles social interactions for Decentraland, built using the Well Known Components architecture pattern. Enables users to create and manage communities, connect with friends, participate in voice chats, and engage in social activities within the metaverse.
  
  **Key Capabilities:**
  
  - **Community Management**: Create and manage communities with customizable privacy settings (public/private) and visibility (listed/unlisted)
  - **Member Management**: Role-based permissions (owner, moderator, member) with invitation and join request workflows
  - **Community Posts**: Share updates and announcements within communities with post likes
  - **Place Associations**: Link communities with specific Decentraland locations
  - **Voice Chat**: Real-time voice chat sessions within communities with role-based participation
  - **Friendship Management**: Manage friend relationships and social connections (via RPC/gRPC)
  - **Privacy Controls**: Blocking and privacy settings for user interactions
  - **Referral System**: Track user referrals, invitations, and referral progress
  - **User Profiles**: Integration with user profiles including claimed names and avatars
  - **Online Status**: Track online status for community members
  
  **Communication Pattern:** 
  - Synchronous HTTP REST API (community management, posts, voice chats)
  - RPC/gRPC (friendships, blocking, private messages)
  - Event-driven via NATS messaging (real-time updates)
  - Server-Sent Events (SSE) for real-time notification streams
  
  **Technology Stack:**
  
  - Runtime: Node.js 20.x
  - Language: TypeScript
  - HTTP Framework: @well-known-components/http-server
  - RPC Framework: @dcl/rpc for gRPC communication
  - Database: PostgreSQL (via @well-known-components/pg-component)
  - Cache: Redis for performance optimization
  - Message Broker: NATS for real-time updates
  - Storage: AWS S3 for media storage
  - Component Architecture: @well-known-components (logger, metrics, http-server, pg-component, nats-component, env-config-provider)
  
  **External Dependencies:**
  
  - **PostgreSQL**: Communities, members, posts, friendships, social settings, referrals, voice chats
  - **Redis**: Caching layer for performance optimization
  - **NATS**: Message broker for real-time updates and event distribution
  - **AWS S3**: Media storage for community images and referral rewards
  - **AWS SNS**: Event notifications for social events
  - **Catalyst**: Content server for user profiles and avatar data
  - **Places API**: Scene and place information
  - **Comms Gatekeeper**: Voice chat token generation
  - **Archipelago Stats**: User presence and online status
  
  **Key Concepts:**
  
  - **Community Privacy**: 
    - Public: Anyone can view and join
    - Private: Requires invitation or approval to join
  - **Community Visibility**: 
    - Listed: Appears in public community listings
    - Unlisted: Only accessible via direct link, not shown in listings
  - **Community Roles**: 
    - `owner`: Full control over the community
    - `moderator`: Can manage members, posts, and settings
    - `member`: Regular community member
    - `none`: Not a member of the community
  - **Request Types**: 
    - `invite`: An invitation sent to a user to join a community
    - `request_to_join`: A request from a user to join a private community
  - **Private Voice Chats**: One-on-one voice chat sessions between users with expiration times
  - **Referral System**: Tracks user referrals with status, tier grants, and email associations
  
  **Database Schema:**
  
  - **Main Tables**: `communities`, `community_members`, `community_posts`, `community_post_likes`, `community_bans`, `community_requests`, `community_places`, `friendships`, `friendships_history`, `social_settings`, `blocks`, `private_voice_chats`, `referral_progress`, `referral_progress_viewed`, `referral_emails`, `referral_reward_images`, `community_ranking_metrics`
  - **Key Relationships**: Communities have members, posts, bans, and places. Members have roles. Posts have likes. Referrals track progress and rewards.
  - **Full Documentation**: See [docs/database-schemas.md](docs/database-schemas.md) for detailed schema, column definitions, and relationships
  
  **API Specification:** OpenAPI docs available at [docs/openapi.yaml](docs/openapi.yaml)
  
  **Authentication Notes:**
  
  - Most REST endpoints use Signed Fetch authentication (ADR-44)
  - Admin endpoints use Bearer token authentication
  - RPC/gRPC endpoints use different authentication mechanisms
  - Scene-based requests are prevented for additional security
  

readme: |
  # Social Service EA
  
  [![Coverage Status](https://coveralls.io/repos/github/decentraland/social-service-ea/badge.svg)](https://coveralls.io/github/decentraland/social-service-ea)
  
  A microservice that handles social interactions for Decentraland, built using the Well Known Components architecture pattern. This service enables users to create and manage communities, connect with friends, participate in voice chats, and engage in social activities within the metaverse.
  
  This server interacts with PostgreSQL for data persistence, Redis for caching, NATS for messaging, AWS S3 for media storage, and various Decentraland services (Catalyst, Places API, Comms Gatekeeper) in order to provide users with comprehensive social features and community management capabilities.
  
  ## Table of Contents
  
  - [Features](#features)
  - [Dependencies](#dependencies)
  - [API Documentation](#api-documentation)
  - [Database](#database)
    - [Schema](#schema)
    - [Migrations](#migrations)
  - [Getting Started](#getting-started)
    - [Prerequisites](#prerequisites)
    - [Installation](#installation)
    - [Configuration](#configuration)
    - [Running the Service](#running-the-service)
  - [Testing](#testing)
  
  ## Features
  
  - **Community Management**: Create and manage communities with customizable privacy settings (public/private) and visibility (listed/unlisted)
  - **Member Management**: Role-based permissions (owner, moderator, member) with invitation and join request workflows
  - **Community Posts**: Share updates and announcements within communities with post likes
  - **Place Associations**: Link communities with specific Decentraland locations
  - **Voice Chat**: Real-time voice chat sessions within communities with role-based participation
  - **Friendship Management**: Manage friend relationships and social connections
  - **Privacy Controls**: Blocking and privacy settings for user interactions
  - **Referral System**: Track user referrals, invitations, and referral progress
  - **User Profiles**: Integration with user profiles including claimed names and avatars
  - **Online Status**: Track online status for community members
  
  ## Dependencies
  
  - **[Catalyst](https://github.com/decentraland/catalyst)**: Content server for user profiles and avatar data
  - **[Places API](https://github.com/decentraland/places-api)**: Scene and place information
  - **[Comms Gatekeeper](https://github.com/decentraland/comms-gatekeeper)**: Voice chat token generation
  - **[Archipelago Stats](https://github.com/decentraland/archipelago-workers)**: User presence and online status
  - **PostgreSQL**: Database for communities, members, posts, friendships, and social settings
  - **Redis**: Caching layer for performance optimization
  - **NATS**: Message broker for real-time updates and event distribution
  - **AWS S3**: Media storage for community images and referral rewards
  - **AWS SNS**: Event notifications for social events
  - **LocalStack** (for local development): AWS services emulation
  
  ## API Documentation
  
  The API is fully documented using the [OpenAPI standard](https://swagger.io/specification/). The schema is located at [docs/openapi.yaml](docs/openapi.yaml).
  
  ### Authentication
  
  This API uses two authentication methods:
  
  - **Signed Fetch (Primary)**: Most endpoints use Signed Fetch authentication (ADR-44), which cryptographically signs requests using the user's Ethereum wallet
  - **Bearer Token (Admin)**: Administrative endpoints use Bearer token authentication for system-level operations
  
  ### Quick Links
  
  - [🌟 Features](https://github.com/decentraland/social-service-ea/wiki/Features)
  - [🏗 Architecture](https://github.com/decentraland/social-service-ea/wiki/Architecture)
  - [🔗 API Documentation](https://github.com/decentraland/social-service-ea/wiki/API-Documentation)
  - [🚀 Getting Started](https://github.com/decentraland/social-service-ea/wiki/Getting-Started)
  - [🧪 Testing](https://github.com/decentraland/social-service-ea/wiki/Testing)
  - [🔄 CI/CD](https://github.com/decentraland/social-service-ea/wiki/CI-CD)
  
  ## Database
  
  ### Schema
  
  See [docs/database-schemas.md](docs/database-schemas.md) for detailed schema, column definitions, and relationships.
  
  ### Migrations
  
  The service uses `node-pg-migrate` for database migrations. These migrations are located in `src/migrations/`. The service automatically runs the migrations when starting up.
  
  #### Create a new migration
  
  Migrations are created by running the create command:
  
  ```bash
  yarn migrate create name-of-the-migration
  ```
  
  This will result in the creation of a migration file inside of the `src/migrations/` directory. This migration file MUST contain the migration set up and rollback procedures.
  
  #### Manually applying migrations
  
  If required, these migrations can be run manually.
  
  To run them manually:
  
  ```bash
  yarn migrate up
  ```
  
  To rollback them manually:
  
  ```bash
  yarn migrate down
  ```
  
  ## Getting Started
  
  ### Prerequisites
  
  Before running this service, ensure you have the following installed:
  
  - **Node.js**: Version 20.x.x or higher
  - **Yarn**: Version 1.22.x or higher
  - **Docker**: For containerized deployment and local development dependencies
  - **Docker Compose**: For orchestrating multiple services
  
  #### Extra prerequisites (optional when not using Docker Compose)
  
  - PostgreSQL 14+
  - Redis 6+
  - NATS 2+
  - LocalStack (for AWS services emulation)
  
  ### Installation
  
  1. Clone the repository:
  
  ```bash
  git clone https://github.com/decentraland/social-service-ea.git
  cd social-service-ea
  ```
  
  2. Install dependencies:
  
  ```bash
  yarn install
  ```
  
  3. Build the project:
  
  ```bash
  yarn build
  ```
  
  ### Configuration
  
  The service uses environment variables for configuration. Copy the example file and adjust as needed:
  
  ```bash
  cp .env.default .env
  ```
  
  See `.env.default` for available configuration options.
  
  ### Running the Service
  
  #### Setting up the environment
  
  In order to successfully run this server, external dependencies such as databases, caches, message brokers, and storage must be provided.
  
  To do so, this repository provides you with a `docker-compose.yml` file for that purpose. In order to get the environment set up, run:
  
  ```bash
  docker compose up -d --wait
  ```
  
  This will start:
  - PostgreSQL database on port `5432`
  - Redis on port `6379`
  - NATS message broker on port `4222`
  - LocalStack (SNS and S3) on port `4566`
  
  You can see the logs of the services with:
  
  ```bash
  docker compose logs -f
  ```
  
  #### Running in development mode
  
  To run the service in development mode:
  
  ```bash
  yarn dev
  ```
  
  This will:
  - Watch for file changes
  - Automatically rebuild TypeScript
  - Restart the server on changes
  
  For production mode:
  
  ```bash
  yarn start
  ```
  
  ## Testing
  
  This service includes comprehensive test coverage with both unit and integration tests.
  
  ### Running Tests
  
  Run all tests with coverage:
  
  ```bash
  yarn test
  ```
  
  Run only unit tests:
  
  ```bash
  yarn test:unit
  ```
  
  Run only integration tests:
  
  ```bash
  yarn test:integration
  ```
  
  Run tests in watch mode:
  
  ```bash
  yarn test:unit:watch
  yarn test:integration:watch
  ```
  
  ### Test Structure
  
  - **Unit Tests** (`test/unit/`): Test individual components and functions in isolation
  - **Integration Tests** (`test/integration/`): Test the complete request/response cycle
  
  For detailed testing guidelines and standards, refer to our [Testing Standards](https://github.com/decentraland/docs/tree/main/development-standards/testing-standards) documentation.
  
  ## AI Agent Context
  
  For detailed AI Agent context, see [docs/ai-agent-context.md](docs/ai-agent-context.md).
  
  ---
  
  **Note**: This service requires multiple external dependencies. Using Docker Compose is the recommended way to run all dependencies locally for development.

extra_docs:
  docs_database-schemas_md: |
    # Database Schema Documentation
    
    This document describes the database schema for the Social Service EA. The schema uses PostgreSQL and is managed through migrations located in `src/migrations/`.
    
    ## Database Schema Diagram
    
    ```mermaid
    erDiagram
        communities {
            UUID id PK "Community ID"
            VARCHAR name "Community name"
            TEXT description "Community description"
            VARCHAR owner_address "Owner address"
            BOOLEAN private "Privacy flag"
            BOOLEAN active "Active status"
            BOOLEAN unlisted "Visibility flag"
            TIMESTAMP created_at "Creation timestamp"
            TIMESTAMP updated_at "Update timestamp"
        }
        
        community_members {
            UUID id PK "Member record ID"
            UUID community_id FK "Community reference"
            VARCHAR member_address "Member address"
            VARCHAR role "Member role"
            TIMESTAMP joined_at "Join timestamp"
        }
        
        community_posts {
            UUID id PK "Post ID"
            UUID community_id FK "Community reference"
            VARCHAR author_address "Author address"
            TEXT content "Post content"
            TIMESTAMP created_at "Creation timestamp"
        }
        
        community_post_likes {
            UUID post_id PK FK "Post reference"
            VARCHAR user_address PK "User address"
            TIMESTAMP liked_at "Like timestamp"
        }
        
        friendships {
            UUID id PK "Friendship ID"
            VARCHAR address_requester "Requester address"
            VARCHAR address_requested "Requested address"
            BOOLEAN is_active "Active status"
            TIMESTAMP created_at "Creation timestamp"
            TIMESTAMP updated_at "Update timestamp"
        }
        
        social_settings {
            VARCHAR address PK "User address"
            VARCHAR private_messages_privacy "Privacy setting"
            VARCHAR blocked_users_messages_visibility "Visibility setting"
        }
        
        private_voice_chats {
            UUID id PK "Voice chat ID"
            VARCHAR caller_address "Caller address"
            VARCHAR callee_address "Callee address"
            TIMESTAMP created_at "Creation timestamp"
            TIMESTAMP updated_at "Update timestamp"
            TIMESTAMP expires_at "Expiration timestamp"
        }
        
        referral_progress {
            UUID id PK "Referral ID"
            TEXT referrer "Referrer address"
            TEXT invited_user "Invited user address"
            TEXT status "Referral status"
            BIGINT signed_up_at "Sign up timestamp"
            BOOLEAN tier_granted "Tier granted flag"
            BIGINT tier_granted_at "Tier granted timestamp"
            BIGINT created_at "Creation timestamp"
            BIGINT updated_at "Update timestamp"
        }
        
        communities ||--o{ community_members : "has"
        communities ||--o{ community_posts : "has"
        communities ||--o{ community_bans : "has"
        communities ||--o{ community_places : "has"
        communities ||--o{ community_requests : "has"
        community_posts ||--o{ community_post_likes : "has"
    ```
    
    ## Tables Overview
    
    The database contains the following main tables:
    
    1. **`communities`** - Stores community information and settings
    2. **`community_members`** - Tracks community membership with roles
    3. **`community_posts`** - Community posts and announcements
    4. **`community_post_likes`** - Post likes by users
    5. **`community_bans`** - Banned users from communities
    6. **`community_requests`** - Join requests and invitations
    7. **`community_places`** - Place associations for communities
    8. **`friendships`** - Friend relationships between users
    9. **`friendships_history`** - Historical friendship records
    10. **`social_settings`** - User privacy and social settings
    11. **`blocks`** - Blocked user relationships
    12. **`private_voice_chats`** - One-on-one voice chat sessions
    13. **`referral_progress`** - User referral tracking
    14. **`referral_progress_viewed`** - Referral progress view tracking
    15. **`referral_emails`** - Email associations for referrals
    16. **`referral_reward_images`** - Referral reward images
    17. **`community_ranking_metrics`** - Community ranking and metrics
    
    ## Table: `communities`
    
    Stores community information including name, description, owner, privacy settings, and visibility.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique community identifier. |
    | `name` | VARCHAR | NOT NULL | Community name. |
    | `description` | TEXT | NOT NULL | Community description. |
    | `owner_address` | VARCHAR | NOT NULL | Ethereum address of the community owner. |
    | `private` | BOOLEAN | NOT NULL | Privacy flag. `true` for private communities, `false` for public. Defaults to `false`. |
    | `active` | BOOLEAN | NOT NULL | Active status. Defaults to `true`. |
    | `unlisted` | BOOLEAN | NOT NULL | Visibility flag. `true` for unlisted communities. |
    | `created_at` | TIMESTAMP | NOT NULL | Timestamp when the community was created. Defaults to `now()`. |
    | `updated_at` | TIMESTAMP | NOT NULL | Timestamp when the community was last updated. Defaults to `now()`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    
    ### Business Rules
    
    1. Each community has one owner
    2. Private communities require invitation or approval to join
    3. Unlisted communities don't appear in public listings
    
    ---
    
    ## Table: `community_members`
    
    Tracks community membership with role-based permissions.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique member record identifier. |
    | `community_id` | UUID | NOT NULL | **Foreign Key** to `communities.id`. |
    | `member_address` | VARCHAR | NOT NULL | Ethereum address of the member. |
    | `role` | VARCHAR | NOT NULL | Member role: `owner`, `moderator`, or `member`. |
    | `joined_at` | TIMESTAMP | NOT NULL | Timestamp when the member joined. Defaults to `now()`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Foreign Key**: `community_id` references `communities(id)` ON DELETE CASCADE
    
    ### Business Rules
    
    1. Each community can have multiple members
    2. Roles: `owner`, `moderator`, `member`
    3. Owner has full control, moderators can manage members and posts
    
    ---
    
    ## Table: `community_posts`
    
    Stores posts and announcements within communities.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique post identifier. Auto-generated. |
    | `community_id` | UUID | NOT NULL | **Foreign Key** to `communities.id`. |
    | `author_address` | VARCHAR | NOT NULL | Ethereum address of the post author. |
    | `content` | TEXT | NOT NULL | Post content. |
    | `created_at` | TIMESTAMP | NOT NULL | Timestamp when the post was created. Defaults to `now()`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Foreign Key**: `community_id` references `communities(id)` ON DELETE CASCADE
    - **Index**: `community_id` - For efficient community post queries
    - **Index**: `community_posts_community_created_idx` on `(community_id, created_at)` - For sorted post queries
    
    ### Business Rules
    
    1. Posts belong to a single community
    2. Posts are ordered by creation time (newest first)
    3. Only community members can create posts
    
    ---
    
    ## Table: `community_post_likes`
    
    Tracks likes on community posts.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `post_id` | UUID | NOT NULL | **Primary Key (part 1)**. **Foreign Key** to `community_posts.id`. |
    | `user_address` | VARCHAR | NOT NULL | **Primary Key (part 2)**. Ethereum address of the user who liked the post. |
    | `liked_at` | TIMESTAMP | NOT NULL | Timestamp when the post was liked. Defaults to `now()`. |
    
    ### Indexes
    
    - **Composite Primary Key**: `(post_id, user_address)` - One like per user per post
    - **Foreign Key**: `post_id` references `community_posts(id)` ON DELETE CASCADE
    - **Index**: `post_id` - For efficient like counting
    
    ### Business Rules
    
    1. One like per user per post
    2. Likes are deleted when posts are deleted (CASCADE)
    
    ---
    
    ## Table: `friendships`
    
    Stores friend relationships between users.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique friendship identifier. |
    | `address_requester` | VARCHAR | NOT NULL | Ethereum address of the user who sent the friend request. |
    | `address_requested` | VARCHAR | NOT NULL | Ethereum address of the user who received the friend request. |
    | `is_active` | BOOLEAN | NOT NULL | Active status. `true` when friendship is active. Defaults to `false`. |
    | `created_at` | TIMESTAMP | NOT NULL | Timestamp when the friendship was created. Defaults to `now()`. |
    | `updated_at` | TIMESTAMP | NOT NULL | Timestamp when the friendship was last updated. Defaults to `now()`. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    
    ### Business Rules
    
    1. Friendships are bidirectional when `is_active = true`
    2. Friend requests start with `is_active = false`
    3. Historical records are maintained in `friendships_history`
    
    ---
    
    ## Table: `social_settings`
    
    Stores user privacy and social interaction settings.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `address` | VARCHAR(42) | NOT NULL | **Primary Key**. Ethereum address of the user. |
    | `private_messages_privacy` | VARCHAR | NOT NULL | Privacy setting for private messages. Defaults to `ONLY_FRIENDS`. |
    | `blocked_users_messages_visibility` | VARCHAR | NOT NULL | Visibility setting for blocked users' messages. Defaults to `SHOW_MESSAGES`. |
    
    ### Indexes
    
    - **Primary Key**: `address`
    
    ### Constraints
    
    - **Check Constraint**: `valid_private_messages_privacy` - Ensures valid privacy values
    - **Check Constraint**: `valid_blocked_users_messages_visibility` - Ensures valid visibility values
    
    ### Business Rules
    
    1. One settings record per user
    2. Privacy settings control who can send private messages
    3. Visibility settings control how blocked users' messages are displayed
    
    ---
    
    ## Table: `private_voice_chats`
    
    Tracks one-on-one voice chat sessions between users.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique voice chat identifier. |
    | `caller_address` | VARCHAR | NOT NULL | Ethereum address of the caller. |
    | `callee_address` | VARCHAR | NOT NULL | Ethereum address of the callee. |
    | `created_at` | TIMESTAMP | NOT NULL | Timestamp when the voice chat was created. Defaults to `now()`. |
    | `updated_at` | TIMESTAMP | NOT NULL | Timestamp when the voice chat was last updated. Defaults to `now()`. |
    | `expires_at` | TIMESTAMP | NOT NULL | Timestamp when the voice chat expires. Must be greater than current time. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Index**: `caller_address` - For efficient caller queries
    - **Index**: `callee_address` - For efficient callee queries
    
    ### Constraints
    
    - **Check Constraint**: `private_voice_chats_expires_at_check` - Ensures `expires_at > now()`
    
    ### Business Rules
    
    1. Only one active private voice chat per user pair
    2. Voice chats have expiration times
    3. Expired voice chats are automatically cleaned up
    
    ---
    
    ## Table: `referral_progress`
    
    Tracks user referrals and invitation progress.
    
    ### Columns
    
    | Column | Type | Nullable | Description |
    |--------|------|----------|-------------|
    | `id` | UUID | NOT NULL | **Primary Key**. Unique referral identifier. |
    | `referrer` | TEXT | NOT NULL | Ethereum address of the referrer. |
    | `invited_user` | TEXT | NOT NULL | Ethereum address of the invited user. |
    | `status` | TEXT | NOT NULL | Referral status. |
    | `signed_up_at` | BIGINT | NULL | Timestamp (in milliseconds) when the user signed up. |
    | `tier_granted` | BOOLEAN | NOT NULL | Whether a tier reward was granted. Defaults to `false`. |
    | `tier_granted_at` | BIGINT | NULL | Timestamp (in milliseconds) when the tier was granted. |
    | `created_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the referral was created. |
    | `updated_at` | BIGINT | NOT NULL | Timestamp (in milliseconds) when the referral was last updated. |
    
    ### Indexes
    
    - **Primary Key**: `id`
    - **Unique Index**: `unique_referral_progress_referrer_invited_user` on `(referrer, invited_user)` - One referral per referrer-invited pair
    - **Index**: `idx_referral_progress_invited_user` on `invited_user` - For efficient invited user queries
    
    ### Business Rules
    
    1. One referral record per referrer-invited user pair
    2. Status tracks the referral progress
    3. Timestamps stored in milliseconds (BIGINT)
    
    ---
    
    ## Related Code
    
    - **Migrations**: `src/migrations/`
    - **Database Adapters**: `src/adapters/db/`
    - **Types**: `src/types/`
    

  docs_schemas_yaml: |
    components:
