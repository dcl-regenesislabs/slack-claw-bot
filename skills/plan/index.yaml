# Decentraland Backend — Triage Index
# layer: RT=realtime CN=content FS=feature_servers LIB=shared_library OTHER=other
# role: gateway|rt-gateway|auth|discovery|storage|worker|content|library|other
#   gateway    = enforces user access (blocks connections/requests)
#   rt-gateway = real-time connection control (LiveKit, WebSocket)
#   auth       = issues or validates identity credentials
#   discovery  = provides information/lists only — never enforces access
#   storage    = owns domain data; extend here for new data models
#   worker     = background processing; not in synchronous request path
#   content    = serves assets/scenes/content
#   library    = shared library, no HTTP surface
#   other      = infra/tooling
# data_domain: domain entities this service owns (empty [] = no domain data)
# Full context per service: services/service_{name}.yaml
# generated: 2026-03-03

services:
  archipelago-workers:
    layer: RT
    role: rt-gateway
    data_domain: [peer-clusters, scene-rooms]
    desc: Workers for peer clustering and communications orchestration
    owner: null
    calls: [catalyst(HTTP)]
    called_by: [social-service-ea(WebSocket), realm-provider(WebSocket)]
  architecture:
    layer: OTHER
    role: other
    data_domain: []
    desc: Platform architecture diagram (D2)
    owner: null
    calls: []
    called_by: []
  asset-bundle-converter:
