            description: Unauthorized - invalid signed fetch
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '403':
            description: Forbidden - invalid metadata
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '404':
            description: List not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
      delete:
        tags:
          - Lists
        summary: Revoke access from private list
        description: |
          Revokes a user's access to a private favorites list.
  
          **Authentication Required**: Only the list owner can revoke access.
  
          After revocation, the specified user will no longer be able to view or modify
          the private list. Use this endpoint to manage access control for collaborative lists.
        operationId: revokeListAccess
        security:
          - SignedFetch: []
        parameters:
          - name: id
            in: path
            required: true
            schema:
              type: string
            description: Unique identifier of the favorites list
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAccessRequest'
        responses:
          '200':
            description: Access revoked successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    success:
                      type: boolean
          '401':
            description: Unauthorized - invalid signed fetch
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '403':
            description: Forbidden - invalid metadata
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '404':
            description: List not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
  components:
    securitySchemes:
      SignedFetch:
        type: http
        scheme: bearer
        description: |
          Signed fetch authentication using decentraland-crypto-middleware with metadata validation (ADR-44l). 
          Requires auth chain headers (x-identity, x-signature, x-timestamp) for signature validation. 
          See http://adr.decentraland.org/adr/ADR-44l for details.
    schemas:
      CatalogResponse:
        type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/CatalogItem'
            description: List of catalog items
          total:
            type: number
            description: Total number of items
        required:
          - items
          - total
      CatalogItem:
        type: object
        properties:
          id:
            type: string
            description: Item ID
          name:
            type: string
            description: Item name
          description:
            type: string
            description: Item description
          image:
            type: string
            description: Item image URL
          category:
            type: string
            description: Item category
          rarity:
            type: string
            description: Item rarity
          price:
            type: number
            description: Item price
          # TODO: align with precise source types - additional properties may exist
        additionalProperties: true
        required:
          - id
          - name
          - category
      WertSignRequest:
        type: object
        properties:
          transaction:
            type: object
            additionalProperties: true
            description: |
              Transaction data (TODO: align with precise source types)
          signature:
            type: string
            description: Transaction signature
        required:
          - transaction
      WertSignResponse:
        type: object
        properties:
          signedTransaction:
            type: string
            description: Signed transaction
          success:
            type: boolean
            description: Signing success status
        required:
          - signedTransaction
          - success
      TransakOrder:
        type: object
        properties:
          id:
            type: string
            description: Order ID
          status:
            type: string
            description: Order status
          amount:
            type: number
            description: Order amount
          currency:
            type: string
            description: Order currency
          createdAt:
            type: string
            format: date-time
            description: Order creation timestamp
        required:
          - id
          - status
          - amount
          - currency
      ENSImageResponse:
        type: object
        properties:
          imageUrl:
            type: string
            description: Generated ENS image URL
          success:
            type: boolean
            description: Generation success status
        required:
          - imageUrl
          - success
      Trade:
        type: object
        properties:
          id:
            type: string
            description: Trade ID
          buyer:
            type: string
            description: Buyer address
          seller:
            type: string
            description: Seller address
          item:
            $ref: '#/components/schemas/Item'
          price:
            type: number
            description: Trade price
          status:
            type: string
            enum: [pending, completed, cancelled]
            description: Trade status
          createdAt:
            type: string
            format: date-time
            description: Trade creation timestamp
        required:
