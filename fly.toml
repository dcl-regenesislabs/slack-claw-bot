# fly.toml app configuration file generated for slack-claw-bot on 2026-03-09T10:02:01-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'slack-claw-bot'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  HTTP_SERVER_HOST = '0.0.0.0'
  HTTP_SERVER_PORT = '5000'
  MAX_CONCURRENT_AGENTS = '2'

[http_service]
  internal_port = 5000
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/health/live'

[mounts]
  source = 'app_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
