version: "1.0"
generated_at: "2026-03-03"
platform: Decentraland Core Backend
workspace: https://github.com/decentraland/core-workspace

architecture_overview: |
  Four-layer backend architecture:
  1. Entry Points Layer — WebSocket Connector (NATS-backed) + HTTP Gateway
  2. Real-Time Layer — LiveKit SFU (positions, chat, voice, streaming)
  3. Content Layer — Catalyst/Worlds → Asset Bundle processing → Registry
  4. Feature Servers Layer — Business logic services via HTTP + AWS SQS events

communication_patterns:
  http_rest: most service-to-service calls
  websocket: real-time peer tracking (archipelago-workers)
  sns_sqs: event-driven async messaging (notifications, badges)
  graphql: blockchain indexers (Squid, The Graph)
  nats: push notifications to clients via WebSocket Connector
  livekit_webrtc: user-to-user real-time (voice, chat, positions)

