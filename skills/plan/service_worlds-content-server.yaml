    /world/{world_name}/settings:
      get:
        tags:
          - Content Server
        summary: /world/{world_name}/settings
        description: Retrieve the settings configuration for a world, including spawn coordinates
        operationId: worldsContentServer_getWorldSettings
        parameters:
          - name: world_name
            in: path
            required: true
            description: The name of the world
            schema:
              type: string
              example: my-name.dcl.eth
        responses:
          '200':
            description: World settings retrieved successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/WorldSettings'
          '404':
            description: World not found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
      put:
        tags:
          - Content Server
        summary: /world/{world_name}/settings
        description: |
          Update world settings via multipart/form-data. Requires signed fetch and world ownership.
          All fields are optional to allow partial updates.
  
          Settings include title, description, content rating, spawn coordinates, skybox time,
          categories, single player mode, show in places, and a thumbnail image.
  
          For spawn coordinates, they must be within the world shape rectangle if the world has deployed scenes.
          Worlds without deployments can have most settings pre-defined (except spawn coordinates).
  
          **Clearing nullable fields:**
          - Send `skybox_time` with the string value `"null"` to reset skybox time (use dynamic day/night cycle).
          - Send `categories` with the string value `"null"` to clear all categories (stores an empty array).
  
          **Validation:**
          - `title` must be between 3 and 100 characters. Empty strings are rejected with a 400 error.
          - `description` must be between 3 and 1000 characters. Empty strings are rejected with a 400 error.
        operationId: worldsContentServer_updateWorldSettings
        security:
          - SignedFetch: []
        parameters:
          - name: world_name
            in: path
            required: true
            description: The name of the world
            schema:
              type: string
              example: my-name.dcl.eth
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  title:
                    type: string
                    description: World title. Must be between 3 and 100 characters. Empty strings are rejected.
                    minLength: 3
                    maxLength: 100
                  description:
                    type: string
                    description: World description. Must be between 3 and 1000 characters. Empty strings are rejected.
                    minLength: 3
                    maxLength: 1000
                  content_rating:
                    type: string
                    description: Content rating
                  spawn_coordinates:
                    type: string
                    description: Spawn coordinates (e.g., "10,20")
                    pattern: '^-?\d+,-?\d+$'
                  skybox_time:
                    type: string
                    description: Fixed skybox time as a number string, or the string "null" to reset to dynamic day/night cycle
                  categories:
                    type: string
                    description: Category values as repeated multipart fields, or the string "null" to clear all categories (stores an empty array)
                  single_player:
                    type: string
                    description: Single player mode ("true" or "false")
                  show_in_places:
                    type: string
                    description: Show in places ("true" or "false")
                  thumbnail:
                    type: string
                    format: binary
                    description: Thumbnail image file (max 1MB)
        responses:
          '200':
            description: World settings updated successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: World settings updated successfully
                    settings:
                      $ref: '#/components/schemas/WorldSettings'
          '400':
            description: Invalid request - validation failed (e.g., spawn coordinates outside world bounds)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: Unauthorized - invalid signature
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '403':
            description: Forbidden - user does not own the world name
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  
    /worlds:
      get:
        tags:
          - Content Server
        summary: GET /worlds
        description: |
          Retrieve a paginated list of worlds with optional search, sorting, and authorized deployer filtering.
  
          This endpoint supports:
          - **Pagination**: Use `limit` and `offset` query parameters
          - **Search**: Full-text search across world name, title, and description
          - **Sorting**: Sort by world name or last deployment time
          - **Authorized deployer filtering**: Filter by worlds where an address can deploy (is owner or has deployment permission)
        operationId: worldsContentServer_getWorlds
        parameters:
          - name: limit
            in: query
            required: false
            schema:
              type: integer
              minimum: 0
              default: 100
            description: Maximum number of worlds to return (default 100)
          - name: offset
            in: query
            required: false
            schema:
              type: integer
              minimum: 0
              default: 0
            description: Number of worlds to skip (default 0)
          - name: search
            in: query
            required: false
            schema:
              type: string
            description: |
              Full-text search query. Searches across world name (highest priority), 
              title (medium priority), and description (lowest priority).
          - name: sort
            in: query
            required: false
            schema:
              type: string
              enum: [name, last_deployed_at]
              default: name
            description: Field to sort by (default "name")
          - name: order
            in: query
            required: false
            schema:
              type: string
              enum: [asc, desc]
              default: asc
            description: Sort direction (default "asc")
          - name: authorized_deployer
            in: query
            required: false
            schema:
              type: string
            description: |
              Ethereum address to filter worlds by deployment capabilities.
              Returns worlds where the specified address is either the owner
              or has been granted deployment permission.
          - name: has_deployed_scenes
            in: query
            required: false
            schema:
              type: boolean
            description: |
              Filter worlds by whether they have deployed scenes.
              When true, returns only worlds with at least one deployed scene.
              When false, returns only worlds with no deployed scenes.
              When not provided, returns all worlds regardless of deployment status.
        responses:
          '200':
            description: Paginated list of worlds
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/WorldsResponse'
                example:
                  worlds:
                    - name: my-world.dcl.eth
                      owner: '0x1234567890123456789012345678901234567890'
                      title: My Awesome World
                      description: A beautiful virtual world
                      shape:
                        x1: 0
                        x2: 2
                        y1: 0
                        y2: 1
                      content_rating: T
                      spawn_coordinates: '1,1'
                      skybox_time: 12
                      categories: ['game', 'adventure']
                      single_player: false
                      show_in_places: true
                      thumbnail_hash: bafkreiabi74jam7uh5gmm6x4hox664j53bmt7dy4alrltkhyj3ozcxs2iu
                      last_deployed_at: '2024-01-15T10:30:00.000Z'
                      blocked_since: null
                    - name: empty-world.dcl.eth
                      owner: '0xabcdef1234567890abcdef1234567890abcdef12'
                      title: Empty World
                      description: null
                      shape: null
                      content_rating: null
                      spawn_coordinates: null
                      skybox_time: null
                      categories: null
                      single_player: null
                      show_in_places: null
                      thumbnail_hash: null
                      last_deployed_at: null
                      blocked_since: null
                  total: 42
          '400':
            description: Invalid request (e.g., invalid sort or order parameter)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
  
