              type: string
            description: List of permissions
        required:
          - userAddress
          - permissions
      RevokeAccessRequest:
        type: object
        properties:
          userAddress:
            type: string
            description: User address to revoke access from
        required:
          - userAddress
      Account:
        type: object
        properties:
