  paths:
    /ping:
      get:
        tags:
          - Health
        summary: Health check endpoint
        description: |
          Simple health check endpoint that returns "pong" when the service is running and healthy.
          Used for monitoring and load balancer health checks.
        operationId: ping
        security: []
        responses:
          '200':
            description: Service is healthy and responding
            content:
              text/plain:
                schema:
                  type: string
                  example: pong
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
    /v1/catalog:
      get:
        tags:
          - Catalog
        summary: Get marketplace catalog (v1)
        description: |
          Retrieves the marketplace catalog with items available for browsing and purchase.
          Supports filtering by category, price range, and various item attributes.
          Authentication is optional but recommended for personalized results.
  
          **Note**: Consider using /v2/catalog for enhanced features and performance.
  
          **Pagination:** Uses `first` and `skip` parameters.
  
          This endpoint shares all the same filter parameters as /v1/items, plus catalog-specific options.
        operationId: getCatalog
        security:
          - SignedFetch: []
          - {}
        parameters:
          - name: first
            in: query
            required: false
            description: 'Maximum number of items to return (default: 20)'
            schema:
              type: number
              default: 20
              example: 10
          - name: skip
            in: query
            required: false
            description: 'Number of items to skip for pagination (default: 0)'
            schema:
              type: number
              default: 0
              example: 0
          - name: sortBy
            in: query
            required: false
            description: 'Sort results by specified criteria'
            schema:
              type: string
              enum: [newest, recently_sold, cheapest, most_expensive, recently_listed]
              example: cheapest
          - name: sortDirection
            in: query
            required: false
            description: 'Sort direction'
            schema:
              type: string
              enum: [asc, desc]
              default: asc
          - name: onlyListing
            in: query
            required: false
            description: 'Show only items with active listings'
            schema:
              type: boolean
          - name: onlyMinting
            in: query
            required: false
            description: 'Show only items available for minting'
            schema:
              type: boolean
          - name: category
            in: query
            required: false
            description: 'Filter by NFT category'
            schema:
              type: string
              enum: [wearable, emote]
          - name: creator
            in: query
            required: false
            description: 'Filter by creator wallet address(es). Can be repeated.'
            schema:
              type: array
              items:
                type: string
            style: form
            explode: true
          - name: isSoldOut
            in: query
            required: false
            description: 'Filter by sold out status'
            schema:
              type: boolean
          - name: isOnSale
            in: query
            required: false
            description: 'Filter by whether item is currently on sale'
            schema:
              type: boolean
          - name: search
            in: query
            required: false
            description: 'Text search across item names and descriptions'
            schema:
              type: string
          - name: isWearableHead
            in: query
            required: false
            description: 'Filter for head wearables only'
            schema:
              type: boolean
          - name: isWearableAccessory
            in: query
            required: false
            description: 'Filter for accessory wearables only'
            schema:
              type: boolean
          - name: isWearableSmart
            in: query
            required: false
            description: 'Filter for smart wearables only'
            schema:
              type: boolean
          - name: wearableCategory
            in: query
            required: false
            description: 'Filter by specific wearable category'
            schema:
              type: string
              enum:
                [
                  eyebrows,
                  eyes,
                  facial_hair,
                  hair,
                  body_shape,
                  mouth,
                  upper_body,
                  lower_body,
                  feet,
                  earring,
                  eyewear,
                  hat,
                  helmet,
                  mask,
                  tiara,
                  top_head,
                  skin,
                  hands_wear
                ]
          - name: rarity
            in: query
            required: false
            description: 'Filter by rarity. Can be repeated for multiple rarities.'
            schema:
              type: array
              items:
                type: string
                enum: [unique, mythic, exotic, legendary, epic, rare, uncommon, common]
            style: form
            explode: true
          - name: wearableGender
            in: query
            required: false
            description: 'Filter by wearable gender compatibility. Can be repeated.'
            schema:
              type: array
              items:
                type: string
                enum: [male, female, unisex]
            style: form
            explode: true
          - name: emoteCategory
            in: query
            required: false
            description: 'Filter by emote category'
            schema:
              type: string
              enum: [dance, stunt, greetings, fun, poses, reactions, horror, miscellaneous]
          - name: emoteGender
            in: query
            required: false
            description: 'Filter by emote gender compatibility. Can be repeated.'
            schema:
              type: array
              items:
                type: string
                enum: [male, female, unisex]
            style: form
            explode: true
          - name: emotePlayMode
            in: query
            required: false
            description: 'Filter by emote play mode. Can be repeated.'
            schema:
              type: array
              items:
                type: string
                enum: [simple, loop]
            style: form
            explode: true
          - name: emoteHasGeometry
            in: query
            required: false
            description: 'Filter for emotes with geometry/props'
            schema:
              type: boolean
          - name: emoteHasSound
            in: query
            required: false
            description: 'Filter for emotes with sound'
            schema:
              type: boolean
          - name: contractAddress
            in: query
            required: false
            description: 'Filter by collection contract address(es). Can be repeated.'
            schema:
              type: array
              items:
                type: string
            style: form
            explode: true
          - name: itemId
            in: query
            required: false
            description: 'Filter by specific item ID within a collection'
            schema:
              type: string
          - name: network
            in: query
            required: false
            description: 'Filter by blockchain network'
            schema:
              type: string
              enum: [ETHEREUM, MATIC]
          - name: minPrice
            in: query
            required: false
            description: 'Minimum price filter in ETH/MATIC'
            schema:
              type: string
          - name: maxPrice
            in: query
            required: false
            description: 'Maximum price filter in ETH/MATIC'
            schema:
              type: string
          - name: urn
            in: query
            required: false
            description: 'Filter by item URN(s). Can be repeated.'
            schema:
              type: array
              items:
                type: string
            style: form
            explode: true
          - name: id
            in: query
            required: false
            description: 'Filter by item ID(s). Can be repeated.'
            schema:
              type: array
              items:
                type: string
            style: form
            explode: true
        responses:
          '200':
            description: Marketplace catalog
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CatalogResponse'
          '400':
            description: Bad request
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
          '500':
            description: Internal server error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Error'
